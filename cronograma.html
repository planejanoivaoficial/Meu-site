<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cronograma Premium | PlanejaNoiva</title>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
:root{
  --rose:#EEABAB;
  --rose-dark:#D98F8F;
  --text:#3F3932;
  --muted:#8F857A;
  --cream:#FFF9F4;
  --border:#EADFD6;
  --green:#25D366;
  --red:#EF4444;
  --shadow:0 18px 50px rgba(63,57,50,.08);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  background:linear-gradient(180deg,#FFF8F3,#FBF6F1);
  color:var(--text);
  min-height:100vh;
}

nav{
  height:76px;
  background:rgba(255,255,255,.86);
  backdrop-filter:blur(16px);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 5%;
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  z-index:10;
}

.nav-logo{height:46px;mix-blend-mode:multiply}

.btn-voltar{
  text-decoration:none;
  color:var(--text);
  font-weight:800;
  background:white;
  border:1px solid var(--border);
  padding:11px 15px;
  border-radius:16px;
  display:flex;
  align-items:center;
  gap:8px;
}

.container{
  max-width:980px;
  margin:34px auto;
  padding:0 20px 60px;
}

.hero{
  background:white;
  border:1px solid var(--border);
  border-radius:34px;
  padding:34px;
  box-shadow:var(--shadow);
  margin-bottom:22px;
}

.badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:var(--cream);
  color:var(--rose-dark);
  border:1px solid var(--border);
  padding:9px 13px;
  border-radius:999px;
  font-size:.82rem;
  font-weight:900;
  margin-bottom:16px;
}

.hero h1{
  font-family:'Playfair Display',serif;
  font-size:2.6rem;
  line-height:1.05;
}

.hero p{
  color:var(--muted);
  line-height:1.7;
  margin-top:10px;
}

.actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin:20px 0;
}

.action-btn{
  border:none;
  padding:15px;
  border-radius:16px;
  font-weight:900;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}

.wpp{background:var(--green);color:white}
.print{background:var(--text);color:white}

.form-box{
  background:white;
  border:1px solid var(--border);
  border-radius:28px;
  padding:20px;
  box-shadow:0 12px 35px rgba(63,57,50,.045);
  margin-bottom:26px;
}

.form{
  display:grid;
  grid-template-columns:130px 1fr auto;
  gap:12px;
}

input{
  padding:15px;
  border-radius:16px;
  border:1px solid var(--border);
  background:var(--cream);
  outline:none;
  font-size:.95rem;
}

.add{
  border:none;
  background:var(--rose);
  color:white;
  padding:0 22px;
  border-radius:16px;
  font-weight:900;
  cursor:pointer;
}

.timeline{
  position:relative;
  padding:10px 0;
}

.timeline::before{
  content:'';
  position:absolute;
  left:25px;
  top:0;
  bottom:0;
  width:2px;
  background:var(--rose);
  opacity:.35;
}

.item{
  position:relative;
  margin-bottom:18px;
  padding-left:70px;
}

.dot{
  position:absolute;
  left:16px;
  top:18px;
  width:20px;
  height:20px;
  background:white;
  border:4px solid var(--rose);
  border-radius:50%;
  box-shadow:0 0 0 6px #FBF6F1;
}

.content{
  background:white;
  border:1px solid var(--border);
  padding:20px;
  border-radius:22px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  box-shadow:0 10px 28px rgba(63,57,50,.04);
}

.time{
  font-family:'Playfair Display',serif;
  color:var(--rose-dark);
  font-size:1.35rem;
  font-weight:900;
  min-width:80px;
}

.desc{
  flex:1;
  font-weight:800;
  line-height:1.4;
}

.del{
  border:none;
  background:#FFF1F1;
  color:var(--red);
  width:42px;
  height:42px;
  border-radius:15px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

.empty{
  background:white;
  border:1px dashed var(--border);
  border-radius:24px;
  padding:30px;
  text-align:center;
  color:var(--muted);
}

@media(max-width:720px){
  .hero h1{font-size:2.1rem}
  .actions{grid-template-columns:1fr}
  .form{grid-template-columns:1fr}
  .add{padding:15px}
  .content{flex-direction:column;align-items:flex-start}
}
</style>
</head>

<body>

<nav>
  <img src="https://i.ibb.co/YTTQXBx8/Logo-Planeja-Noiva.png" class="nav-logo">
  <a href="dashboard.html" class="btn-voltar">
    <span class="material-symbols-outlined">arrow_back</span>
    Painel
  </a>
</nav>

<div class="container">

<section class="hero">
  <div class="badge">
    <span class="material-symbols-outlined">calendar_month</span>
    Roteiro premium
  </div>

  <h1>O roteiro elegante para o dia mais importante.</h1>
  <p>
    Organize horários, entradas, cerimônia, recepção e momentos especiais em uma linha do tempo clara para noivos, cerimonial e fornecedores.
  </p>
</section>

<div class="actions">
  <button onclick="compartilharWhatsApp()" class="action-btn wpp">
    <span class="material-symbols-outlined">ios_share</span>
    Compartilhar WhatsApp
  </button>

  <button onclick="abrirImpressao()" class="action-btn print">
    <span class="material-symbols-outlined">print</span>
    Ver versão oficial
  </button>
</div>

<div class="form-box">
  <div class="form">
    <input type="time" id="hora">
    <input type="text" id="descricao" placeholder="Ex: Entrada da noiva">
    <button class="add" onclick="add()">Adicionar</button>
  </div>
</div>

<div class="timeline" id="lista"></div>

</div>

<script>
const supa = supabase.createClient(
  'https://vuiqbdqnfnofwkpvvuqy.supabase.co',
  'sb_publishable_LjKm4HF9kyD7m0ch3Eefdw_TJ5SG6w2'
);

const email = localStorage.getItem('usuario_email');

if (!email) {
  window.location.href = 'index.html';
}

async function load(){
  const { data, error } = await supa
    .from('cronograma')
    .select('*')
    .eq('usuario_email',email)
    .order('hora',{ascending:true});

  if(error){
    Swal.fire("Erro ao carregar cronograma");
    return;
  }

  const lista = document.getElementById('lista');

  if(!data || data.length === 0){
    lista.innerHTML = `
      <div class="empty">
        Nenhum horário cadastrado ainda. Comece pela cerimônia, recepção ou making of.
      </div>
    `;
    return;
  }

  let html = "";

  data.forEach(e=>{
    html += `
      <div class="item">
        <div class="dot"></div>

        <div class="content">
          <span class="time">${e.hora.substring(0,5)}h</span>
          <span class="desc">${e.descricao}</span>

          <button class="del" onclick="del(${e.id})">
            <span class="material-symbols-outlined">delete</span>
          </button>
        </div>
      </div>
    `;
  });

  lista.innerHTML = html;
}

async function add(){
  const h = document.getElementById('hora').value;
  const d = document.getElementById('descricao').value.trim();

  if(!h || !d){
    Swal.fire({
      icon:'warning',
      title:'Preencha tudo',
      text:'Informe o horário e a descrição do momento.',
      confirmButtonColor:'#EEABAB'
    });
    return;
  }

  await supa
    .from('cronograma')
    .insert([{hora:h, descricao:d, usuario_email:email}]);

  document.getElementById('hora').value = "";
  document.getElementById('descricao').value = "";

  load();
}

async function del(id){
  const r = await Swal.fire({
    title:'Remover horário?',
    icon:'warning',
    showCancelButton:true,
    confirmButtonText:'Sim, remover',
    cancelButtonText:'Cancelar',
    confirmButtonColor:'#EEABAB'
  });

  if(!r.isConfirmed) return;

  await supa.from('cronograma').delete().eq('id',id);
  load();
}

function linkPublico(){
  return window.location.href.replace('cronograma.html','visualizar_cronograma.html') + `?noiva=${encodeURIComponent(email)}`;
}

function compartilharWhatsApp(){
  const link = linkPublico();
  window.open(`https://wa.me/?text=${encodeURIComponent("Veja o cronograma oficial do casamento: " + link)}`,'_blank');
}

function abrirImpressao(){
  window.open(linkPublico(),'_blank');
}

load();
</script>

</body>
</html>
