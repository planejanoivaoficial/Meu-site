<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cronograma Premium | PlanejaNoiva</title>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
:root{
  --rose:#EEABAB;
  --rose-dark:#D98F8F;
  --text:#3F3932;
  --muted:#8F857A;
  --cream:#FFF9F4;
  --border:#EADFD6;
  --green:#25D366;
  --red:#EF4444;
  --shadow:0 18px 50px rgba(63,57,50,.08);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  background:
    radial-gradient(circle at top left, rgba(238,171,171,.24), transparent 30%),
    linear-gradient(180deg,#FFF8F3,#FBF6F1);
  color:var(--text);
  min-height:100vh;
}

nav{
  height:76px;
  background:rgba(255,255,255,.88);
  backdrop-filter:blur(16px);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 5%;
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  z-index:10;
}

.nav-logo{height:46px;mix-blend-mode:multiply}

.btn-voltar{
  text-decoration:none;
  color:var(--text);
  font-weight:800;
  background:white;
  border:1px solid var(--border);
  padding:11px 15px;
  border-radius:16px;
  display:flex;
  align-items:center;
  gap:8px;
}

.container{
  max-width:980px;
  margin:34px auto;
  padding:0 20px 60px;
}

.hero{
  background:white;
  border:1px solid var(--border);
  border-radius:34px;
  padding:34px;
  box-shadow:var(--shadow);
  margin-bottom:22px;
  position:relative;
  overflow:hidden;
}

.hero::after{
  content:'';
  position:absolute;
  width:260px;
  height:260px;
  border-radius:50%;
  background:rgba(238,171,171,.12);
  right:-110px;
  top:-120px;
}

.hero > *{
  position:relative;
  z-index:1;
}

.badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:var(--cream);
  color:var(--rose-dark);
  border:1px solid var(--border);
  padding:9px 13px;
  border-radius:999px;
  font-size:.82rem;
  font-weight:900;
  margin-bottom:16px;
}

.hero h1{
  font-family:'Playfair Display',serif;
  font-size:2.6rem;
  line-height:1.05;
}

.hero p{
  color:var(--muted);
  line-height:1.7;
  margin-top:10px;
}

.actions{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  margin:20px 0;
}

.action-btn{
  border:none;
  padding:15px;
  border-radius:16px;
  font-weight:900;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  transition:.25s;
}

.action-btn:hover{
  transform:translateY(-2px);
}

.wpp{background:var(--green);color:white}
.print{background:var(--text);color:white}
.ai{background:linear-gradient(135deg,var(--rose),var(--rose-dark));color:white}

.form-box{
  background:white;
  border:1px solid var(--border);
  border-radius:28px;
  padding:20px;
  box-shadow:0 12px 35px rgba(63,57,50,.045);
  margin-bottom:26px;
}

.form{
  display:grid;
  grid-template-columns:130px 1fr auto;
  gap:12px;
}

input{
  padding:15px;
  border-radius:16px;
  border:1px solid var(--border);
  background:var(--cream);
  outline:none;
  font-size:.95rem;
  color:var(--text);
}

input:focus{
  border-color:var(--rose);
  background:white;
  box-shadow:0 0 0 4px rgba(238,171,171,.12);
}

.add{
  border:none;
  background:var(--rose);
  color:white;
  padding:0 22px;
  border-radius:16px;
  font-weight:900;
  cursor:pointer;
}

.timeline{
  position:relative;
  padding:10px 0;
}

.timeline::before{
  content:'';
  position:absolute;
  left:25px;
  top:0;
  bottom:0;
  width:2px;
  background:var(--rose);
  opacity:.35;
}

.item{
  position:relative;
  margin-bottom:18px;
  padding-left:70px;
}

.dot{
  position:absolute;
  left:16px;
  top:18px;
  width:20px;
  height:20px;
  background:white;
  border:4px solid var(--rose);
  border-radius:50%;
  box-shadow:0 0 0 6px #FBF6F1;
}

.content{
  background:white;
  border:1px solid var(--border);
  padding:20px;
  border-radius:22px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  box-shadow:0 10px 28px rgba(63,57,50,.04);
}

.time{
  font-family:'Playfair Display',serif;
  color:var(--rose-dark);
  font-size:1.35rem;
  font-weight:900;
  min-width:80px;
}

.desc{
  flex:1;
  font-weight:800;
  line-height:1.4;
}

.del{
  border:none;
  background:#FFF1F1;
  color:var(--red);
  width:42px;
  height:42px;
  border-radius:15px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

.empty{
  background:white;
  border:1px dashed var(--border);
  border-radius:24px;
  padding:30px;
  text-align:center;
  color:var(--muted);
}

@media(max-width:720px){
  .hero h1{font-size:2.1rem}
  .actions{grid-template-columns:1fr}
  .form{grid-template-columns:1fr}
  .add{padding:15px}
  .content{flex-direction:column;align-items:flex-start}
}
</style>
</head>

<body>

<nav>
  <img src="https://vuiqbdqnfnofwkpvvuqy.supabase.co/storage/v1/object/public/logos/logo.png" class="nav-logo" alt="PlanejaNoiva">
  <a href="dashboard.html" class="btn-voltar">
    <span class="material-symbols-outlined">arrow_back</span>
    Painel
  </a>
</nav>

<div class="container">

<section class="hero">
  <div class="badge">
    <span class="material-symbols-outlined">calendar_month</span>
    Roteiro premium
  </div>

  <h1>O roteiro elegante para o dia mais importante.</h1>
  <p>
    Organize horários, entradas, cerimônia, recepção e momentos especiais em uma linha do tempo clara para noivos, cerimonial e fornecedores.
  </p>
</section>

<div class="actions">
  <button onclick="gerarSugestao()" class="action-btn ai">
    <span class="material-symbols-outlined">auto_awesome</span>
    Gerar sugestão
  </button>

  <button onclick="compartilharWhatsApp()" class="action-btn wpp">
    <span class="material-symbols-outlined">ios_share</span>
    Compartilhar WhatsApp
  </button>

  <button onclick="abrirImpressao()" class="action-btn print">
    <span class="material-symbols-outlined">print</span>
    Ver versão oficial
  </button>
</div>

<div class="form-box">
  <div class="form">
    <input type="time" id="hora">
    <input type="text" id="descricao" placeholder="Ex: Entrada da noiva">
    <button class="add" id="btnAdicionar" onclick="add()">Adicionar</button>
  </div>
</div>

<div class="timeline" id="lista"></div>

</div>

<script>
const supa = supabase.createClient(
  'https://vuiqbdqnfnofwkpvvuqy.supabase.co',
  'sb_publishable_LjKm4HF9kyD7m0ch3Eefdw_TJ5SG6w2'
);

let usuarioLogado = null;
let email = null;
let dataCasamentoUsuario = null;

const hora = document.getElementById('hora');
const descricao = document.getElementById('descricao');
const lista = document.getElementById('lista');
const btnAdicionar = document.getElementById('btnAdicionar');

async function iniciarCronograma(){
  const { data, error } = await supa.auth.getSession();

  if(error || !data.session){
    localStorage.clear();
    window.location.href = 'index.html';
    return;
  }

  usuarioLogado = data.session.user;
  email = usuarioLogado.email;

  localStorage.setItem('usuario_email', email);

  await carregarPerfilEvento();
  await load();
}

async function carregarPerfilEvento(){
  const { data } = await supa
    .from('usuarios')
    .select('data_casamento')
    .eq('email', email)
    .maybeSingle();

  dataCasamentoUsuario = data?.data_casamento || null;
}

function escaparHTML(texto){
  const div = document.createElement('div');
  div.innerText = texto || '';
  return div.innerHTML;
}

function minutosDoHorario(horaTexto){
  if(!horaTexto) return 0;

  const partes = horaTexto.substring(0,5).split(':');
  const h = Number(partes[0] || 0);
  const m = Number(partes[1] || 0);

  return (h * 60) + m;
}

function horarioOrdenavel(horaTexto){
  const minutos = minutosDoHorario(horaTexto);

  if(!dataCasamentoUsuario){
    return minutos;
  }

  const casamento = new Date(dataCasamentoUsuario);
  const minutoCasamento = casamento.getHours() * 60 + casamento.getMinutes();

  const inicioDiaCasamento = minutoCasamento - 420;

  if(minutos < inicioDiaCasamento){
    return minutos + 1440;
  }

  return minutos;
}

function somarMinutos(dataBase, minutos){
  const d = new Date(dataBase);
  d.setMinutes(d.getMinutes() + minutos);
  return d.toTimeString().substring(0,5);
}

async function load(){
  const { data, error } = await supa
    .from('cronograma')
    .select('*')
    .eq('usuario_email', email);

  if(error){
    Swal.fire({
      icon:'error',
      title:'Erro ao carregar',
      text:'Não foi possível carregar o cronograma.',
      confirmButtonColor:'#EEABAB'
    });
    return;
  }

  if(!data || data.length === 0){
    lista.innerHTML = `
      <div class="empty">
        Nenhum horário cadastrado ainda. Use “Gerar sugestão” para criar um roteiro com base no horário do casamento.
      </div>
    `;
    return;
  }

  const dadosOrdenados = [...data].sort((a,b) => {
    return horarioOrdenavel(a.hora) - horarioOrdenavel(b.hora);
  });

  let html = '';

  dadosOrdenados.forEach(e => {
    html += `
      <div class="item">
        <div class="dot"></div>

        <div class="content">
          <span class="time">${escaparHTML((e.hora || '').substring(0,5))}h</span>
          <span class="desc">${escaparHTML(e.descricao)}</span>

          <button class="del" onclick="del(${e.id})">
            <span class="material-symbols-outlined">delete</span>
          </button>
        </div>
      </div>
    `;
  });

  lista.innerHTML = html;
}

async function add(){
  const h = hora.value;
  const d = descricao.value.trim();

  if(!h || !d){
    Swal.fire({
      icon:'warning',
      title:'Preencha tudo',
      text:'Informe o horário e a descrição do momento.',
      confirmButtonColor:'#EEABAB'
    });
    return;
  }

  btnAdicionar.disabled = true;
  btnAdicionar.innerText = 'Adicionando...';

  const { error } = await supa
    .from('cronograma')
    .insert([{ hora:h, descricao:d, usuario_email:email }]);

  btnAdicionar.disabled = false;
  btnAdicionar.innerText = 'Adicionar';

  if(error){
    Swal.fire({
      icon:'error',
      title:'Erro ao adicionar',
      text:'Não foi possível salvar esse horário.',
      confirmButtonColor:'#EEABAB'
    });
    return;
  }

  hora.value = '';
  descricao.value = '';

  await load();
}

async function gerarSugestao(){
  const { data:user } = await supa
    .from('usuarios')
    .select('data_casamento')
    .eq('email', email)
    .single();

  if(!user || !user.data_casamento){
    Swal.fire({
      icon:'warning',
      title:'Data não encontrada',
      text:'Cadastre a data e horário do casamento em Meu Perfil ou Configurações.',
      confirmButtonColor:'#EEABAB'
    });
    return;
  }

  dataCasamentoUsuario = user.data_casamento;

  const casamento = new Date(user.data_casamento);

  const sugestoes = [
    { min:-360, desc:'Início do making of da noiva' },
    { min:-300, desc:'Cabelo e maquiagem' },
    { min:-240, desc:'Making of do noivo' },
    { min:-180, desc:'Fotos da noiva pronta' },
    { min:-120, desc:'Saída da noiva para o local da cerimônia' },
    { min:-60, desc:'Chegada dos padrinhos e familiares' },
    { min:-30, desc:'Recepção dos convidados' },
    { min:0, desc:'Início da cerimônia' },
    { min:15, desc:'Entrada dos padrinhos' },
    { min:25, desc:'Entrada do noivo' },
    { min:35, desc:'Entrada da noiva' },
    { min:55, desc:'Troca das alianças' },
    { min:70, desc:'Bênção e assinatura' },
    { min:90, desc:'Saída dos noivos' },
    { min:120, desc:'Fotos oficiais com família e padrinhos' },
    { min:150, desc:'Entrada dos noivos na recepção' },
    { min:180, desc:'Jantar ou serviço de buffet' },
    { min:240, desc:'Brinde e corte do bolo' },
    { min:270, desc:'Primeira dança dos noivos' },
    { min:300, desc:'Abertura da pista' },
    { min:420, desc:'Café, doces ou lanche da madrugada' },
    { min:480, desc:'Encerramento previsto' }
  ];

  const r = await Swal.fire({
    icon:'question',
    title:'Gerar sugestão de roteiro?',
    text:'Isso criará um cronograma automático com base no horário do casamento. Os itens atuais serão mantidos.',
    showCancelButton:true,
    confirmButtonText:'Sim, gerar',
    cancelButtonText:'Cancelar',
    confirmButtonColor:'#EEABAB'
  });

  if(!r.isConfirmed) return;

  Swal.fire({
    title:'Gerando roteiro...',
    allowOutsideClick:false,
    didOpen:()=>Swal.showLoading()
  });

  const itens = sugestoes.map(item => ({
    usuario_email: email,
    hora: somarMinutos(casamento, item.min),
    descricao: item.desc
  }));

  const { error } = await supa
    .from('cronograma')
    .insert(itens);

  if(error){
    Swal.fire({
      icon:'error',
      title:'Erro ao gerar',
      text:'Não foi possível criar o roteiro automático.',
      confirmButtonColor:'#EEABAB'
    });
    return;
  }

  Swal.fire({
    icon:'success',
    title:'Roteiro criado 💍',
    text:'A sugestão foi adicionada ao cronograma.',
    confirmButtonColor:'#EEABAB'
  });

  await load();
}

async function del(id){
  const r = await Swal.fire({
    title:'Remover horário?',
    text:'Esse item sairá do cronograma.',
    icon:'warning',
    showCancelButton:true,
    confirmButtonText:'Sim, remover',
    cancelButtonText:'Cancelar',
    confirmButtonColor:'#D9534F',
    cancelButtonColor:'#EADFD6'
  });

  if(!r.isConfirmed) return;

  const { error } = await supa
    .from('cronograma')
    .delete()
    .eq('id', id)
    .eq('usuario_email', email);

  if(error){
    Swal.fire({
      icon:'error',
      title:'Erro ao remover',
      text:'Não foi possível apagar esse horário.',
      confirmButtonColor:'#EEABAB'
    });
    return;
  }

  await load();
}

function linkPublico(){
  return window.location.origin +
    window.location.pathname.replace('cronograma.html','visualizar_cronograma.html') +
    `?noiva=${encodeURIComponent(email)}`;
}

function compartilharWhatsApp(){
  const link = linkPublico();
  window.open(`https://wa.me/?text=${encodeURIComponent("Veja o cronograma oficial do casamento: " + link)}`, '_blank');
}

function abrirImpressao(){
  window.open(linkPublico(), '_blank');
}

descricao.addEventListener('keypress', e => {
  if(e.key === 'Enter') add();
});

iniciarCronograma();
</script>

</body>
</html>
