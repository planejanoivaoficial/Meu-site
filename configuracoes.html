<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Configurações | PlanejaNoiva</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
:root{
--rose:#EEABAB;
--text:#3F3932;
--muted:#8F857A;
--bg:#FBF6F1;
--border:#EADFD6;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter'}

body{
background:linear-gradient(180deg,#FFF8F3,#FBF6F1);
color:var(--text);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:24px;
}

.card{
background:white;
padding:45px;
border-radius:30px;
max-width:480px;
width:100%;
box-shadow:0 20px 60px rgba(0,0,0,.06);
animation:fade .6s ease;
}

.logo{
height:65px;
display:block;
margin:0 auto 18px;
mix-blend-mode:multiply;
}

h1{
font-family:'Playfair Display';
text-align:center;
font-size:2rem;
margin-bottom:8px;
}

.sub{
text-align:center;
color:var(--muted);
margin-bottom:28px;
line-height:1.5;
}

.group{
margin-bottom:18px;
}

label{
display:block;
font-size:.72rem;
font-weight:700;
text-transform:uppercase;
letter-spacing:1px;
color:var(--muted);
margin-bottom:7px;
}

input{
width:100%;
padding:15px;
border-radius:14px;
border:1px solid var(--border);
background:#FCF9F5;
outline:none;
font-size:1rem;
}

input:focus{
border-color:var(--rose);
background:white;
}

.btn{
width:100%;
padding:16px;
border:none;
background:var(--rose);
color:white;
border-radius:15px;
font-weight:700;
cursor:pointer;
transition:.3s;
font-size:1rem;
margin-top:8px;
}

.btn:hover{
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(238,171,171,.35);
}

.voltar{
display:block;
text-align:center;
margin-top:18px;
color:var(--muted);
text-decoration:none;
font-size:.85rem;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}
</style>
</head>

<body>

<div class="card">

<img src="https://i.ibb.co/YTTQXBx8/Logo-Planeja-Noiva.png" class="logo">

<h1>Configurações 💍</h1>
<p class="sub">Ajuste os dados principais que aparecem no cronograma oficial.</p>

<div class="group">
<label>Nome do noivo</label>
<input type="text" id="nomeNoivo" placeholder="Ex: Odesvaldo Júnior">
</div>

<div class="group">
<label>Data e hora do casamento</label>
<input type="datetime-local" id="dataCasamento">
</div>

<div class="group">
<label>Local do evento</label>
<input type="text" id="localCasamento" placeholder="Ex: Goiânia, GO">
</div>

<button class="btn" onclick="atualizarDados()">Salvar configurações</button>

<a href="dashboard.html" class="voltar">Voltar ao painel</a>

</div>

<script>
const supa = supabase.createClient(
'https://vuiqbdqnfnofwkpvvuqy.supabase.co',
'sb_publishable_LjKm4HF9kyD7m0ch3Eefdw_TJ5SG6w2'
);

const emailNoiva = localStorage.getItem('usuario_email');

if(!emailNoiva){
window.location.href = 'index.html';
}

async function carregarCampos(){
const { data } = await supa
.from('usuarios')
.select('nome_noivo, data_casamento, local_casamento')
.eq('email', emailNoiva)
.single();

if(data){
document.getElementById('nomeNoivo').value = data.nome_noivo || "";
document.getElementById('localCasamento').value = data.local_casamento || "";

if(data.data_casamento){
document.getElementById('dataCasamento').value = data.data_casamento.substring(0,16);
}
}
}

async function atualizarDados(){
const noivo = document.getElementById('nomeNoivo').value;
const dataH = document.getElementById('dataCasamento').value;
const local = document.getElementById('localCasamento').value;

if(!noivo || !dataH){
Swal.fire({
icon:'info',
title:'Campos obrigatórios',
text:'Preencha o nome do noivo e a data do casamento.',
confirmButtonColor:'#EEABAB'
});
return;
}

Swal.fire({
title:'Salvando...',
allowOutsideClick:false,
didOpen:()=>Swal.showLoading()
});

const { error } = await supa
.from('usuarios')
.update({
nome_noivo:noivo,
data_casamento:dataH,
local_casamento:local
})
.eq('email', emailNoiva);

if(!error){
Swal.fire({
icon:'success',
title:'Configurações salvas 💍',
text:'Seu cronograma já foi atualizado.',
confirmButtonColor:'#EEABAB'
});
}else{
Swal.fire({
icon:'error',
title:'Erro ao salvar',
text:error.message,
confirmButtonColor:'#EEABAB'
});
}
}

carregarCampos();
</script>

</body>
</html>
