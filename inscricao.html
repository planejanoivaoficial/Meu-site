<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crie seu Planejamento | PlanejaNoiva</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
:root{
--rose:#EEABAB;
--bg:#FBF6F1;
--text:#3F3932;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter'}

body{
background:linear-gradient(180deg,#FFF8F3,#FBF6F1);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.card{
background:white;
padding:45px;
border-radius:30px;
max-width:600px;
width:100%;
box-shadow:0 20px 60px rgba(0,0,0,.05);
animation:fade .6s ease;
}

.logo{
display:block;
margin:auto;
height:65px;
margin-bottom:20px;
}

h1{
text-align:center;
font-family:'Playfair Display';
font-size:1.8rem;
margin-bottom:10px;
}

.sub{
text-align:center;
color:#8F857A;
margin-bottom:25px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.full{grid-column:span 2;}

input{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid #EADFD6;
background:#FCF9F5;
}

input:focus{
border-color:var(--rose);
background:white;
outline:none;
}

.color-box{
display:flex;
justify-content:center;
align-items:center;
padding:20px;
border:1px dashed var(--rose);
border-radius:15px;
}

.circle{
width:60px;
height:60px;
border-radius:50%;
background:var(--rose);
cursor:pointer;
position:relative;
}

.circle input{
position:absolute;
opacity:0;
width:100%;
height:100%;
cursor:pointer;
}

.btn{
width:100%;
padding:16px;
background:var(--rose);
color:white;
border:none;
border-radius:14px;
font-weight:600;
margin-top:20px;
cursor:pointer;
transition:.3s;
}

.btn:hover{
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(238,171,171,.4);
}

@keyframes fade{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}
</style>
</head>

<body>

<div class="card">

<img src="https://i.ibb.co/YTTQXBx8/Logo-Planeja-Noiva.png" class="logo">

<h1>Crie seu planejamento 💍</h1>
<p class="sub">Comece agora a organizar o dia mais importante da sua vida</p>

<div class="grid">

<input class="full" id="nomeNoiva" placeholder="Seu nome completo">

<input id="email" type="email" placeholder="Seu e-mail">
<input id="senha" type="password" placeholder="Sua senha">

<input class="full" id="nomeNoivo" placeholder="Nome do noivo">

<input id="dataCasamento" type="datetime-local">
<input id="local" placeholder="Cidade / Local">

<div class="full color-box">
<div class="circle" id="circle">
<input type="color" id="cor" value="#EEABAB" 
oninput="circle.style.backgroundColor=this.value">
</div>
</div>

</div>

<button class="btn" onclick="registrar()">Criar meu painel</button>

</div>

<script>
const supa = supabase.createClient(
'https://vuiqbdqnfnofwkpvvuqy.supabase.co',
'sb_publishable_LjKm4HF9kyD7m0ch3Eefdw_TJ5SG6w2'
);

async function registrar(){

const nome = nomeNoiva.value;
const email = email.value;
const senha = senha.value;
const noivo = nomeNoivo.value;
const data = dataCasamento.value;
const local = local.value;
const cor = cor.value;

if(!nome || !email || !senha || !data){
Swal.fire({
icon:'warning',
title:'Preencha os campos obrigatórios',
confirmButtonColor:'#EEABAB'
});
return;
}

Swal.fire({
title:'Criando seu painel...',
allowOutsideClick:false,
didOpen:()=>Swal.showLoading()
});

const { error } = await supa.from('usuarios').insert([{
nome:nome,
email:email,
senha:senha,
nome_noivo:noivo,
data_casamento:data,
local_casamento:local,
paleta_cores:cor
}]);

if(error){
Swal.fire({
icon:'error',
title:'Erro ao criar conta',
text:error.message
});
}else{

localStorage.setItem('usuario_email',email);
localStorage.setItem('usuario_nome',nome);

Swal.fire({
icon:'success',
title:'Bem-vinda 💍',
text:'Seu painel já está pronto',
confirmButtonColor:'#EEABAB'
}).then(()=>{
window.location.href='dashboard.html';
});

}
}
</script>

</body>
</html>
