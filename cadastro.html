<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PlanejaNoiva | Começar meu planejamento</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
:root{
--rose:#EEABAB;
--text:#3F3932;
--muted:#8F857A;
--bg:#FBF6F1;
--gold:#D4AF37;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter'}

body{
background:linear-gradient(180deg,#FFF8F3,#FBF6F1);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:30px;
}

/* CARD */
.card{
background:white;
padding:45px;
border-radius:30px;
max-width:560px;
width:100%;
box-shadow:0 20px 50px rgba(0,0,0,.06);
animation:fadeUp .6s ease;
}

/* HEADER */
.logo{
height:60px;
margin-bottom:15px;
}

h1{
font-family:'Playfair Display';
font-size:2rem;
margin-bottom:10px;
}

.sub{
color:var(--muted);
margin-bottom:25px;
}

/* FORM */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.full{grid-column:span 2;}

label{
font-size:0.7rem;
text-transform:uppercase;
font-weight:700;
color:var(--muted);
margin-bottom:5px;
display:block;
}

input{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid #EADFD6;
background:#FCF9F5;
outline:none;
transition:.3s;
}

input:focus{
border-color:var(--rose);
background:white;
}

/* COLOR PICKER */
.palette{
grid-column:span 2;
border:1px dashed var(--rose);
padding:20px;
border-radius:15px;
text-align:center;
}

.circle{
width:70px;
height:70px;
border-radius:50%;
background:var(--rose);
margin:10px auto;
border:3px solid var(--gold);
position:relative;
cursor:pointer;
}

.circle input{
position:absolute;
inset:0;
opacity:0;
cursor:pointer;
}

/* BUTTON */
.btn{
margin-top:20px;
width:100%;
padding:16px;
border:none;
background:var(--rose);
color:white;
border-radius:15px;
font-weight:700;
cursor:pointer;
transition:.4s;
}

.btn:hover{
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(238,171,171,.4);
}

/* FOOTER */
.footer{
margin-top:20px;
font-size:.85rem;
text-align:center;
color:var(--muted);
}

.footer a{
color:var(--rose);
font-weight:600;
text-decoration:none;
}

/* ANIMAÇÃO */
@keyframes fadeUp{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div class="card">

<img src="https://vuiqbdqnfnofwkpvvuqy.supabase.co/storage/v1/object/public/logos/logo.png" class="logo">

<h1>Comece seu planejamento 💍</h1>
<p class="sub">Crie sua conta e organize seu casamento com leveza e controle</p>

<div class="grid">

<div class="full">
<label>Seu nome</label>
<input id="nome" placeholder="Ex: Letícia Moura">
</div>

<div>
<label>Email</label>
<input id="email" type="email">
</div>

<div>
<label>Senha</label>
<input id="senha" type="password">
</div>

<div class="full">
<label>Nome do noivo</label>
<input id="noivo">
</div>

<div>
<label>Data</label>
<input id="data" type="datetime-local">
</div>

<div>
<label>Cidade</label>
<input id="local">
</div>

<div class="palette">
<label>Sua paleta</label>
<div class="circle" id="preview">
<input type="color" id="cor" value="#EEABAB"
oninput="preview.style.backgroundColor=this.value">
</div>
</div>

</div>

<button class="btn" onclick="registrar()">Criar minha conta 💖</button>

<div class="footer">
Já tem conta? <a href="index.html">Entrar</a>
</div>

</div>

<script>
const supa = supabase.createClient(
'https://vuiqbdqnfnofwkpvvuqy.supabase.co',
'sb_publishable_LjKm4HF9kyD7m0ch3Eefdw_TJ5SG6w2'
);

async function registrar(){

const nome=document.getElementById('nome').value;
const email=document.getElementById('email').value;
const senha=document.getElementById('senha').value;
const noivo=document.getElementById('noivo').value;
const data=document.getElementById('data').value;
const local=document.getElementById('local').value;
const cor=document.getElementById('cor').value;

if(!nome || !email || !senha || !data){
Swal.fire("Preencha os campos obrigatórios ✨");
return;
}

/* LOADING PREMIUM */
Swal.fire({
title:"Criando sua conta...",
allowOutsideClick:false,
didOpen:()=>Swal.showLoading()
});

const { error } = await supa.from('usuarios').insert([{
nome,
email,
senha,
nome_noivo:noivo,
data_casamento:data,
local_casamento:local,
paleta_cores:cor
}]);

if(!error){

localStorage.setItem('usuario_email',email);
localStorage.setItem('usuario_nome',nome);

Swal.fire({
icon:'success',
title:'Conta criada 💍',
text:'Seu planejamento já começou!',
confirmButtonColor:'#EEABAB'
}).then(()=>{
window.location.href='dashboard.html';
});

}else{
Swal.fire("Erro ao criar conta");
}

}
</script>

</body>
</html>
