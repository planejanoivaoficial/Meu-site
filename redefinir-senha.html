<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlanejaNoiva - Nova Senha</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Estética de Luxo: Tons de Areia e Bronze */
        body { 
            font-family: 'Times New Roman', Times, serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background-color: #f8f5f2; 
            margin: 0; 
        }
        .card { 
            background: white; 
            padding: 50px; 
            border-radius: 4px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            width: 100%; 
            max-width: 450px; 
            text-align: center; 
            border: 1px solid #e2d1c3; 
        }
        h2 { 
            color: #5c4d42; 
            margin-bottom: 20px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-weight: 300;
        }
        p#subtitulo {
            color: #8c7e74;
            font-style: italic;
            margin-bottom: 30px;
        }
        input { 
            width: 100%; 
            padding: 15px; 
            margin: 10px 0; 
            border: 1px solid #e2d1c3; 
            border-radius: 2px; 
            box-sizing: border-box; 
            font-family: sans-serif;
        }
        button { 
            width: 100%; 
            padding: 18px; 
            background-color: #d4a373; 
            color: white; 
            border: none; 
            border-radius: 2px; 
            cursor: pointer; 
            font-weight: bold; 
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s; 
            margin-top: 20px;
        }
        button:hover { 
            background-color: #b58d63; 
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        #mensagem { 
            margin-top: 20px; 
            font-size: 14px; 
            min-height: 20px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Criar Nova Senha</h2>
        <p id="subtitulo">Escolha sua nova senha para continuar sua jornada no PlanejaNoiva.</p>
        
        <input type="password" id="novaSenha" placeholder="Nova Senha">
        <input type="password" id="confirmarSenha" placeholder="Confirme a Nova Senha">
        
        <button id="btnAtualizar" onclick="atualizarSenha()">Salvar Alterações</button>
        
        <p id="mensagem"></p>
    </div>

    <script>
        const supabaseUrl = 'https://vuiqbdqnfnofwkpvvuqy.supabase.co';
        const supabaseKey = 'sb_publishable_LjKm4HF9kyD7m0ch3Eefdw_TJ5SG6w2';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // Verificação de Segurança: Garante que há uma sessão ativa via link de e-mail
        window.onload = async () => {
            const { data: { session }, error } = await _supabase.auth.getSession();
            const msgElement = document.getElementById('mensagem');
            
            if (error || !session) {
                msgElement.style.color = "#d32f2f";
                msgElement.innerText = "Link expirado ou inválido. Solicite uma nova recuperação.";
                document.getElementById('btnAtualizar').disabled = true;
            }
        };

        async function atualizarSenha() {
            const senha = document.getElementById('novaSenha').value;
            const confirma = document.getElementById('confirmarSenha').value;
            const msgElement = document.getElementById('mensagem');
            const btn = document.getElementById('btnAtualizar');

            msgElement.innerText = "";

            if (!senha || !confirma) {
                msgElement.style.color = "#d32f2f";
                msgElement.innerText = "Preencha todos os campos.";
                return;
            }

            if (senha !== confirma) {
                msgElement.style.color = "#d32f2f";
                msgElement.innerText = "As senhas não coincidem.";
                return;
            }

            if (senha.length < 6) {
                msgElement.style.color = "#d32f2f";
                msgElement.innerText = "A senha deve ter no mínimo 6 caracteres.";
                return;
            }

            btn.disabled = true;
            btn.innerText = "Processando...";

            const { error } = await _supabase.auth.updateUser({ password: senha });

            if (error) {
                msgElement.style.color = "#d32f2f";
                msgElement.innerText = "Erro: " + error.message;
                btn.disabled = false;
                btn.innerText = "Salvar Alterações";
            } else {
                msgElement.style.color = "#5c4d42";
                msgElement.innerText = "Senha atualizada! Redirecionando...";
                setTimeout(() => {
                    window.location.href = "index.html"; 
                }, 2500);
            }
        }
    </script>
</body>
</html>
