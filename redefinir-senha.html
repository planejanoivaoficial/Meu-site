<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nova Senha | PlanejaNoiva</title>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
:root{
  --rose:#EEABAB;
  --text:#3F3932;
  --muted:#8F857A;
  --bg:#FBF6F1;
  --border:#EADFD6;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter'}

body{
  background:linear-gradient(180deg,#FFF8F3,#FBF6F1);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
}

.card{
  background:white;
  padding:45px;
  border-radius:28px;
  max-width:420px;
  width:100%;
  text-align:center;
  box-shadow:0 20px 50px rgba(0,0,0,.06);
  animation:fade .6s ease;
}

.logo{
  height:70px;
  margin-bottom:20px;
}

h1{
  font-family:'Playfair Display';
  font-size:1.8rem;
  margin-bottom:10px;
}

.sub{
  color:var(--muted);
  margin-bottom:25px;
  font-size:.95rem;
}

.input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid var(--border);
  background:#FCF9F5;
  margin-bottom:15px;
}

.input:focus{
  border-color:var(--rose);
  background:white;
  outline:none;
}

.btn{
  width:100%;
  padding:16px;
  border:none;
  background:var(--rose);
  color:white;
  border-radius:14px;
  font-weight:700;
  cursor:pointer;
  transition:.3s;
}

.btn:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 25px rgba(238,171,171,.4);
}

@keyframes fade{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div class="card">

<img src="https://vuiqbdqnfnofwkpvvuqy.supabase.co/storage/v1/object/public/logos/logo.png" class="logo">

<h1>Definir nova senha 🔐</h1>
<p class="sub">Escolha uma senha segura para continuar seu planejamento</p>

<input type="password" id="senha" class="input" placeholder="Nova senha">
<input type="password" id="confirmar" class="input" placeholder="Confirmar senha">

<button class="btn" onclick="atualizar()">Salvar nova senha</button>

</div>

<script>
const supa = supabase.createClient(
'https://vuiqbdqnfnofwkpvvuqy.supabase.co',
'sb_publishable_LjKm4HF9kyD7m0ch3Eefdw_TJ5SG6w2'
);

window.onload = async () => {
  const { data } = await supa.auth.getSession();

  if(!data.session){
    Swal.fire({
      icon:'error',
      title:'Link inválido',
      text:'Solicite um novo e-mail de recuperação.',
      confirmButtonColor:'#EEABAB'
    });
  }
};

async function atualizar(){
  const senha = document.getElementById('senha').value;
  const confirmar = document.getElementById('confirmar').value;

  if(senha.length < 6){
    Swal.fire({
      icon:'warning',
      title:'Senha muito curta',
      text:'Use pelo menos 6 caracteres.',
      confirmButtonColor:'#EEABAB'
    });
    return;
  }

  if(senha !== confirmar){
    Swal.fire({
      icon:'warning',
      title:'Senhas diferentes',
      text:'Confirme corretamente.',
      confirmButtonColor:'#EEABAB'
    });
    return;
  }

  Swal.fire({
    title:'Atualizando senha...',
    allowOutsideClick:false,
    didOpen:()=>Swal.showLoading()
  });

  const { error } = await supa.auth.updateUser({
    password:senha
  });

  if(error){
    Swal.fire({
      icon:'error',
      title:'Erro',
      text:error.message,
      confirmButtonColor:'#EEABAB'
    });
  }else{
    Swal.fire({
      icon:'success',
      title:'Senha atualizada 💍',
      text:'Agora você pode acessar normalmente.',
      confirmButtonColor:'#EEABAB'
    }).then(()=>{
      window.location.href = 'index.html';
    });
  }
}
</script>

</body>
</html>
