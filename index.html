<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar | PlanejaNoiva</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --cor-primaria: #EEABAB;
            --cor-texto: #4A453E;
            --cor-fundo: #F7EFE4;
            --cor-bege-input: #FCF9F5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { 
            background-color: var(--cor-fundo); 
            background-image: url("https://www.transparenttextures.com/patterns/silk-weave.png");
            display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; 
        }
        
        .login-card { 
            background: white; padding: 45px; border-radius: 28px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.06); 
            width: 100%; max-width: 420px; text-align: center; 
            border: 1px solid rgba(238, 171, 171, 0.2); 
            transition: 0.3s;
        }

        .logo-img { height: 90px; margin-bottom: 30px; mix-blend-mode: multiply; }
        
        .input-group { text-align: left; margin-bottom: 20px; }
        
        .label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        
        label { font-size: 0.75rem; font-weight: 700; color: var(--cor-texto); text-transform: uppercase; letter-spacing: 0.5px; }
        
        .forgot-link { font-size: 0.7rem; color: var(--cor-primaria); text-decoration: none; font-weight: 600; transition: 0.3s; cursor: pointer; }
        .forgot-link:hover { text-decoration: underline; }

        input { 
            width: 100%; padding: 14px 16px; border: 1px solid #E5DED5; border-radius: 12px; 
            outline: none; background-color: var(--cor-bege-input); color: var(--cor-texto); 
            font-size: 0.95rem; transition: 0.3s;
        }
        input:focus { border-color: var(--cor-primaria); background-color: white; box-shadow: 0 0 0 4px rgba(238, 171, 171, 0.1); }
        
        .password-wrapper { position: relative; }
        .toggle-password { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--cor-primaria); font-size: 22px; opacity: 0.7; }
        .toggle-password:hover { opacity: 1; }
        
        .btn-entrar { 
            width: 100%; padding: 16px; background-color: var(--cor-primaria); color: white; 
            border: none; border-radius: 12px; font-weight: 700; cursor: pointer; 
            margin-top: 10px; transition: 0.4s; font-size: 1rem; letter-spacing: 0.5px;
        }
        .btn-entrar:hover { background-color: #e59a9a; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(238, 171, 171, 0.3); }
        
        .footer-text { margin-top: 25px; font-size: 0.85rem; color: #8C857B; }
        .footer-text a { color: var(--cor-primaria); text-decoration: none; font-weight: 700; }
        .footer-text a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="login-card">
        <!-- Logo do PlanejaNoiva vinda do seu bucket oficial -->
        <img src="https://vuiqbdqnfnofwkpvvuqy.supabase.co/storage/v1/object/public/logos/logo.png" alt="PlanejaNoiva" class="logo-img">
        
        <div class="input-group">
            <label>E-mail</label>
            <input type="email" id="emailInput" placeholder="exemplo@email.com">
        </div>

        <div class="input-group">
            <div class="label-row">
                <label>Senha</label>
                <a onclick="esqueciSenha()" class="forgot-link">Esqueci minha senha</a>
            </div>
            <div class="password-wrapper">
                <input type="password" id="senhaInput" placeholder="••••••••">
                <span class="toggle-password material-symbols-outlined" onclick="toggleSenha()" id="olhinho">visibility</span>
            </div>
        </div>

        <button class="btn-entrar" onclick="realizarLogin()">Acessar Painel Profissional</button>
        
        <div class="footer-text">Não tem conta? <a href="cadastro.html">Cadastre-se grátis</a></div>
    </div>

    <script>
        // Configuração oficial do seu Supabase
        const _supabase = supabase.createClient('https://vuiqbdqnfnofwkpvvuqy.supabase.co', 'sb_publishable_LjKm4HF9kyD7m0ch3Eefdw_TJ5SG6w2');

        async function realizarLogin() {
            const email = document.getElementById('emailInput').value;
            const senha = document.getElementById('senhaInput').value;

            if (!email || !senha) {
                Swal.fire({ icon: 'warning', title: 'Atenção', text: 'Preencha todos os campos.', confirmButtonColor: '#EEABAB' });
                return;
            }

            // Realiza o login usando o sistema de autenticação oficial para evitar erros de permissão
            const { data, error } = await _supabase.auth.signInWithPassword({
                email: email,
                password: senha,
            });

            if (error) { 
                Swal.fire({ 
                    icon: 'error', 
                    title: 'Acesso Negado', 
                    text: 'E-mail ou senha incorretos ou não confirmados.', 
                    confirmButtonColor: '#EEABAB' 
                });
            } else { 
                localStorage.setItem('usuario_email', data.user.email); 
                window.location.href = 'dashboard.html'; 
            }
        }

        async function esqueciSenha() {
            const { value: email } = await Swal.fire({
                title: 'Recuperar Senha',
                text: 'Digite o e-mail cadastrado para receber o link de redefinição.',
                input: 'email',
                inputPlaceholder: 'seu@email.com',
                confirmButtonText: 'Enviar Link',
                confirmButtonColor: '#EEABAB',
                showCancelButton: true,
                cancelButtonText: 'Voltar',
                cancelButtonColor: '#E5DED5'
            });

            if (email) {
                // Ajuste crítico: Redirecionamento para a página correta na Vercel
                const { error } = await _supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: 'https://planeja-noiva.vercel.app/redefinir-senha.html'
                });
                
                if (error) {
                    const msg = error.status === 429 ? 'Muitas tentativas. Aguarde 15 minutos.' : error.message;
                    Swal.fire({ icon: 'error', title: 'Ops!', text: msg, confirmButtonColor: '#EEABAB' });
                } else {
                    Swal.fire({ 
                        icon: 'success', 
                        title: 'E-mail Enviado!', 
                        text: 'Verifique sua caixa de entrada para redefinir sua senha.', 
                        confirmButtonColor: '#EEABAB' 
                    });
                }
            }
        }

        function toggleSenha() {
            const input = document.getElementById('senhaInput');
            const olho = document.getElementById('olhinho');
            input.type = input.type === "password" ? "text" : "password";
            olho.innerText = input.type === "password" ? "visibility" : "visibility_off";
        }
    </script>
</body>
</html>
