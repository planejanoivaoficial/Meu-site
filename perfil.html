<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Minha Identidade | PlanejaNoiva</title>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
:root{
--rose:#EEABAB;
--rose-dark:#D98F8F;
--text:#3F3932;
--muted:#8F857A;
--bg:#FBF6F1;
--cream:#FFF9F4;
--border:#EADFD6;
--gold:#D4AF37;
--shadow:0 20px 60px rgba(63,57,50,.08);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
min-height:100vh;
background:
radial-gradient(circle at top left, rgba(238,171,171,.24), transparent 32%),
linear-gradient(180deg,#FFF8F3,#FBF6F1);
color:var(--text);
}

nav{
height:76px;
background:rgba(255,255,255,.86);
backdrop-filter:blur(16px);
padding:0 5%;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(234,223,214,.75);
position:sticky;
top:0;
z-index:100;
}

nav img{
height:46px;
mix-blend-mode:multiply;
}

.voltar{
color:var(--rose-dark);
font-weight:800;
text-decoration:none;
background:white;
border:1px solid var(--border);
padding:11px 15px;
border-radius:14px;
display:flex;
align-items:center;
gap:8px;
}

.container{
max-width:850px;
margin:42px auto;
padding:0 20px 60px;
animation:fade .6s ease;
}

header{
text-align:center;
margin-bottom:32px;
}

header h1{
font-family:'Playfair Display',serif;
font-size:2.35rem;
line-height:1.1;
}

header p{
color:var(--muted);
margin-top:8px;
line-height:1.6;
}

.card{
background:rgba(255,255,255,.94);
padding:30px;
border-radius:28px;
margin-bottom:24px;
border:1px solid rgba(234,223,214,.85);
box-shadow:0 14px 38px rgba(63,57,50,.055);
transition:.25s;
}

.card:hover{
transform:translateY(-3px);
box-shadow:var(--shadow);
}

.title{
display:flex;
align-items:center;
gap:8px;
font-size:.76rem;
font-weight:900;
letter-spacing:1.8px;
text-transform:uppercase;
color:var(--rose-dark);
margin-bottom:22px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:17px;
}

.full{
grid-column:span 2;
}

label{
font-size:.72rem;
font-weight:800;
color:var(--muted);
text-transform:uppercase;
letter-spacing:.45px;
margin-bottom:7px;
display:block;
}

input{
width:100%;
padding:15px 16px;
border-radius:14px;
border:1px solid var(--border);
background:#FCF9F5;
outline:none;
transition:.25s;
font-size:.95rem;
color:var(--text);
}

input:focus{
border-color:var(--rose);
background:white;
box-shadow:0 0 0 4px rgba(238,171,171,.12);
}

input:disabled{
opacity:.65;
cursor:not-allowed;
}

.color-box{
text-align:center;
padding:24px 18px 28px;
background:var(--cream);
border:1px dashed rgba(238,171,171,.55);
border-radius:22px;
margin-bottom:22px;
}

.color-row{
display:flex;
align-items:center;
justify-content:center;
gap:18px;
flex-wrap:wrap;
margin-top:15px;
}

.circle{
width:92px;
height:92px;
border-radius:50%;
border:4px solid rgba(212,175,55,.72);
box-shadow:
0 12px 28px rgba(238,171,171,.22),
inset 0 2px 7px rgba(255,255,255,.5);
background:var(--rose);
}

.color-input{
width:90px;
height:48px;
padding:4px;
border-radius:14px;
cursor:pointer;
background:white;
}

.hint{
color:#A1968A;
font-size:.82rem;
margin-top:10px;
}

.btn{
width:100%;
padding:18px;
border:none;
background:linear-gradient(135deg,var(--rose),var(--rose-dark));
color:white;
font-weight:900;
border-radius:17px;
cursor:pointer;
transition:.3s;
font-size:1rem;
box-shadow:0 14px 28px rgba(238,171,171,.34);
}

.btn:hover{
transform:translateY(-2px);
box-shadow:0 18px 34px rgba(238,171,171,.42);
}

.btn:disabled{
opacity:.72;
cursor:not-allowed;
transform:none;
}

@media(max-width:650px){
nav{
padding:0 18px;
}

.container{
margin-top:30px;
}

header h1{
font-size:1.9rem;
}

.card{
padding:24px 20px;
border-radius:24px;
}

.grid{
grid-template-columns:1fr;
}

.full{
grid-column:span 1;
}
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>
</head>

<body>

<nav>
<img src="https://vuiqbdqnfnofwkpvvuqy.supabase.co/storage/v1/object/public/logos/logo.png" alt="PlanejaNoiva">

<a href="dashboard.html" class="voltar">
<span class="material-symbols-outlined">arrow_back</span>
Painel
</a>
</nav>

<div class="container">

<header>
<h1>Sua Identidade 💍</h1>
<p>Defina os detalhes que dão alma, cor e direção ao seu casamento.</p>
</header>

<div class="card">
<div class="title">
<span class="material-symbols-outlined">person</span>
Dados da Noiva
</div>

<div class="grid">

<div class="full">
<label for="nome">Seu nome</label>
<input id="nome" placeholder="Ex: Gabriey Moura">
</div>

<div class="full">
<label for="email">Email</label>
<input id="email" disabled>
</div>

</div>
</div>

<div class="card">
<div class="title">
<span class="material-symbols-outlined">favorite</span>
Identidade do casamento
</div>

<div class="color-box">
<label for="cor">Cor principal</label>

<div class="color-row">
<div class="circle" id="preview"></div>
<input type="color" id="cor" class="color-input" value="#EEABAB">
</div>

<div class="hint">Escolha o tom visual do seu grande dia.</div>
</div>

<div class="grid">

<div class="full">
<label for="noivo">Nome do noivo</label>
<input id="noivo" placeholder="Ex: Junior">
</div>

<div>
<label for="data">Data e horário do casamento</label>
<input type="datetime-local" id="data">
</div>

<div>
<label for="local">Local</label>
<input id="local" placeholder="Ex: Goiânia - GO">
</div>

</div>
</div>

<button class="btn" id="btnSalvar" onclick="salvar()">Salvar identidade ✨</button>

</div>

<script>
const supa = supabase.createClient(
'https://vuiqbdqnfnofwkpvvuqy.supabase.co',
'sb_publishable_LjKm4HF9kyD7m0ch3Eefdw_TJ5SG6w2'
);

let usuarioLogado = null;

const nome = document.getElementById('nome');
const emailInput = document.getElementById('email');
const noivo = document.getElementById('noivo');
const dataInput = document.getElementById('data');
const localInput = document.getElementById('local');
const cor = document.getElementById('cor');
const preview = document.getElementById('preview');
const btnSalvar = document.getElementById('btnSalvar');

cor.addEventListener('input', function(){
preview.style.backgroundColor = this.value;
document.documentElement.style.setProperty('--rose', this.value);
});

async function iniciar(){
const { data, error } = await supa.auth.getSession();

if(error || !data.session){
localStorage.clear();
window.location.href = 'index.html';
return;
}

usuarioLogado = data.session.user;
localStorage.setItem('usuario_email', usuarioLogado.email);

await carregar();
}

async function carregar(){
const { data, error } = await supa
.from('usuarios')
.select('*')
.eq('email', usuarioLogado.email)
.maybeSingle();

emailInput.value = usuarioLogado.email;

if(error){
console.log('Erro ao carregar perfil:', error);
return;
}

if(data){
nome.value = data.nome || '';
noivo.value = data.nome_noivo || '';
localInput.value = data.local_casamento || '';

if(data.data_casamento){
dataInput.value = data.data_casamento.substring(0,16);
}

if(data.paleta_cores){
cor.value = data.paleta_cores;
preview.style.backgroundColor = data.paleta_cores;
document.documentElement.style.setProperty('--rose', data.paleta_cores);
}
}else{
nome.value = localStorage.getItem('usuario_nome') || '';
preview.style.backgroundColor = cor.value;
}
}

async function salvar(){
const nomeValor = nome.value.trim();
const noivoValor = noivo.value.trim();
const localValor = localInput.value.trim();
const corValor = cor.value;
const dataValor = dataInput.value || null;

if(!nomeValor){
Swal.fire({
icon:'warning',
title:'Nome obrigatório',
text:'Informe seu nome para salvar.',
confirmButtonColor:'#EEABAB'
});
return;
}

btnSalvar.disabled = true;
btnSalvar.innerText = 'Salvando...';

const { error } = await supa
.from('usuarios')
.upsert({
id: usuarioLogado.id,
email: usuarioLogado.email,
nome: nomeValor,
nome_noivo: noivoValor,
data_casamento: dataValor,
local_casamento: localValor,
paleta_cores: corValor
}, {
onConflict: 'id'
});

btnSalvar.disabled = false;
btnSalvar.innerText = 'Salvar identidade ✨';

if(error){
Swal.fire({
icon:'error',
title:'Erro ao salvar',
text:error.message,
confirmButtonColor:'#EEABAB'
});
return;
}

localStorage.setItem('usuario_nome', nomeValor);
localStorage.setItem('usuario_email', usuarioLogado.email);

Swal.fire({
icon:'success',
title:'Identidade salva 💍',
text:'Agora a data e a paleta já podem ser usadas no cronograma.',
confirmButtonColor:'#EEABAB'
});
}

preview.style.backgroundColor = cor.value;
iniciar();
</script>

</body>
</html>
