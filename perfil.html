<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Minha Identidade | PlanejaNoiva</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
:root{
--rose:#EEABAB;
--text:#3F3932;
--muted:#8F857A;
--bg:#FBF6F1;
--gold:#D4AF37;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter'}

body{
background:linear-gradient(180deg,#FFF8F3,#FBF6F1);
color:var(--text);
}

/* NAV */
nav{
background:white;
padding:15px 5%;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 5px 20px rgba(0,0,0,.05);
position:sticky;
top:0;
z-index:100;
}

nav img{height:40px}

.voltar{
color:var(--rose);
font-weight:700;
text-decoration:none;
}

/* CONTAINER */
.container{
max-width:750px;
margin:50px auto;
padding:20px;
}

/* HEADER */
header{
text-align:center;
margin-bottom:35px;
}

header h1{
font-family:'Playfair Display';
font-size:2rem;
}

header p{
color:var(--muted);
margin-top:5px;
}

/* CARD */
.card{
background:white;
padding:30px;
border-radius:25px;
margin-bottom:25px;
box-shadow:0 15px 40px rgba(0,0,0,.05);
transition:.3s;
}

.card:hover{
transform:translateY(-3px);
}

/* TITULO */
.title{
font-size:.75rem;
font-weight:700;
letter-spacing:2px;
text-transform:uppercase;
color:var(--rose);
margin-bottom:20px;
}

/* FORM */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.full{grid-column:span 2;}

label{
font-size:.7rem;
font-weight:700;
color:var(--muted);
}

input{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid #EADFD6;
background:#FCF9F5;
outline:none;
transition:.3s;
}

input:focus{
border-color:var(--rose);
background:white;
}

/* COR */
.color-box{
text-align:center;
padding:20px 0;
}

.circle{
width:90px;
height:90px;
border-radius:50%;
margin:15px auto;
border:3px solid var(--gold);
box-shadow:0 10px 25px rgba(0,0,0,.1);
position:relative;
cursor:pointer;
transition:.4s;
}

.circle:hover{
transform:scale(1.08);
}

.circle input{
position:absolute;
inset:0;
opacity:0;
cursor:pointer;
}

/* BOTÃO */
.btn{
width:100%;
padding:18px;
border:none;
background:var(--rose);
color:white;
font-weight:700;
border-radius:15px;
cursor:pointer;
transition:.4s;
font-size:1rem;
}

.btn:hover{
transform:translateY(-2px);
box-shadow:0 15px 25px rgba(238,171,171,.4);
}

/* ANIMAÇÃO */
.container{animation:fade .6s ease}

@keyframes fade{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<nav>
<img src="https://i.ibb.co/YTTQXBx8/Logo-Planeja-Noiva.png">
<a href="dashboard.html" class="voltar">← Painel</a>
</nav>

<div class="container">

<header>
<h1>Sua Identidade 💍</h1>
<p>Defina os detalhes que vão dar alma ao seu casamento</p>
</header>

<!-- DADOS -->
<div class="card">
<div class="title">Dados da Noiva</div>

<div class="grid">

<div class="full">
<label>Seu nome</label>
<input id="nome">
</div>

<div class="full">
<label>Email</label>
<input id="email" disabled style="opacity:.6">
</div>

</div>
</div>

<!-- IDENTIDADE -->
<div class="card">
<div class="title">Identidade do casamento</div>

<div class="color-box">
<label>Cor principal</label>

<div class="circle" id="preview">
<input type="color" id="cor"
oninput="preview.style.backgroundColor=this.value">
</div>

<small style="color:#aaa">Escolha o tom do seu grande dia</small>
</div>

<div class="grid">

<div class="full">
<label>Nome do noivo</label>
<input id="noivo">
</div>

<div>
<label>Data</label>
<input type="datetime-local" id="data">
</div>

<div>
<label>Local</label>
<input id="local">
</div>

</div>
</div>

<button class="btn" onclick="salvar()">Salvar identidade ✨</button>

</div>

<script>
const supa = supabase.createClient(
'https://vuiqbdqnfnofwkpvvuqy.supabase.co',
'sb_publishable_LjKm4HF9kyD7m0ch3Eefdw_TJ5SG6w2'
);

const email = localStorage.getItem('usuario_email');

/* LOAD */
async function carregar(){

if(!email) return;

const { data } = await supa
.from('usuarios')
.select('*')
.eq('email',email)
.single();

if(data){
nome.value=data.nome||"";
noivo.value=data.nome_noivo||"";
local.value=data.local_casamento||"";
emailInput=data.email;

document.getElementById('email').value=data.email;

if(data.data_casamento){
dataInput=data.data_casamento.substring(0,16);
document.getElementById('data').value=dataInput;
}

if(data.paleta_cores){
cor.value=data.paleta_cores;
preview.style.backgroundColor=data.paleta_cores;
}
}

}

/* SAVE */
async function salvar(){

if(!nome.value){
Swal.fire("Seu nome é obrigatório");
return;
}

/* loading premium */
Swal.fire({
title:"Salvando...",
allowOutsideClick:false,
didOpen:()=>Swal.showLoading()
});

const { error } = await supa
.from('usuarios')
.update({
nome:nome.value,
nome_noivo:noivo.value,
data_casamento:data.value,
local_casamento:local.value,
paleta_cores:cor.value
})
.eq('email',email);

if(!error){

localStorage.setItem('usuario_nome',nome.value);

Swal.fire({
icon:'success',
title:'Atualizado 💍',
text:'Seu casamento já está refletindo isso!',
confirmButtonColor:'#EEABAB'
});

}else{
Swal.fire("Erro ao salvar");
}

}

carregar();
</script>

</body>
</html>
