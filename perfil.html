<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil | PlanejaNoiva</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --cor-primaria: #EEABAB;
            --cor-texto: #4A453E;
            --cor-fundo: #FDF9F6;
            --cor-borda: #E5DED5;
            --cor-dourado: #D4AF37;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--cor-fundo); color: var(--cor-texto); padding-bottom: 60px; }

        nav { 
            background: white; padding: 15px 5%; display: flex; justify-content: space-between; 
            align-items: center; box-shadow: 0 2px 15px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; 
        }
        .nav-logo { height: 40px; mix-blend-mode: multiply; }
        .btn-voltar { color: var(--cor-primaria); text-decoration: none; font-weight: 700; display: flex; align-items: center; gap: 5px; }

        .container { max-width: 700px; margin: 40px auto; padding: 0 20px; }

        header { text-align: center; margin-bottom: 40px; }
        header h1 { font-family: 'Montserrat', sans-serif; font-size: 1.8rem; letter-spacing: -1px; }
        header p { color: #8C857B; font-size: 0.9rem; margin-top: 5px; }

        .perfil-card { 
            background: white; padding: 35px; border-radius: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.03); border: 1px solid rgba(238, 171, 171, 0.1);
            margin-bottom: 30px;
        }

        .section-title { 
            display: flex; align-items: center; gap: 10px; 
            font-weight: 700; font-size: 0.85rem; text-transform: uppercase; 
            letter-spacing: 1px; color: var(--cor-primaria); margin-bottom: 25px;
            border-bottom: 1px solid var(--cor-fundo); padding-bottom: 10px;
        }

        .grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full-width { grid-column: span 2; }

        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-size: 0.75rem; font-weight: 700; color: #8C857B; }
        .form-group input { 
            padding: 14px; border: 1px solid var(--cor-borda); border-radius: 12px; 
            outline: none; background: #FCF9F5; font-size: 1rem; transition: 0.3s;
        }
        .form-group input:focus { border-color: var(--cor-primaria); background: white; }

        .color-center { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px 0; }
        .preview-circle {
            width: 90px; height: 90px; border-radius: 50%; 
            background-color: var(--cor-primaria); 
            border: 3px solid var(--cor-dourado); 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            cursor: pointer; transition: 0.4s; position: relative;
        }
        .preview-circle:hover { transform: scale(1.08); }
        .input-hidden-color { position: absolute; opacity: 0; inset: 0; cursor: pointer; width: 100%; height: 100%; }

        .btn-save { 
            width: 100%; background: var(--cor-primaria); color: white; border: none; 
            padding: 18px; border-radius: 15px; font-weight: 700; cursor: pointer; 
            transition: 0.4s; font-size: 1rem; margin-top: 10px;
            box-shadow: 0 10px 20px rgba(238, 171, 171, 0.2);
        }
        .btn-save:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(238, 171, 171, 0.3); }
    </style>
</head>
<body>

    <nav>
        <img src="https://i.ibb.co/YTTQXBx8/Logo-Planeja-Noiva.png" class="nav-logo">
        <a href="dashboard.html" class="btn-voltar">
            <span class="material-symbols-outlined">arrow_back</span> Painel
        </a>
    </nav>

    <div class="container">
        <header>
            <h1>Configurações de Identidade</h1>
            <p>Gerencie os detalhes que tornam seu cronograma oficial e elegante.</p>
        </header>

        <div class="perfil-card">
            <div class="section-title">
                <span class="material-symbols-outlined">person</span> Dados da Noiva
            </div>
            <div class="grid-form">
                <div class="form-group full-width">
                    <label>Seu Nome Completo</label>
                    <input type="text" id="nomeNoiva" placeholder="Ex: Letícia Gabriely Alves Moura">
                </div>
                <div class="form-group full-width">
                    <label>E-mail de Acesso</label>
                    <input type="email" id="emailNoiva" disabled style="background-color: #f0f0f0; opacity: 0.7;">
                </div>
            </div>
        </div>

        <div class="perfil-card">
            <div class="section-title">
                <span class="material-symbols-outlined">palette</span> Identidade do Casamento
            </div>
            
            <div class="color-center">
                <label style="font-size: 0.7rem; font-weight: 700; color: #8C857B; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px;">Cor Identidade do Grande Dia</label>
                <div class="preview-circle" id="circleDisplay">
                    <input type="color" id="corPrincipal" class="input-hidden-color" oninput="document.getElementById('circleDisplay').style.backgroundColor = this.value">
                </div>
                <p style="font-size: 0.7rem; color: #B2ACA3; margin-top: 12px; font-style: italic;">Toque no círculo para definir o tom do seu cronograma</p>
            </div>

            <div class="grid-form">
                <div class="form-group full-width">
                    <label>Nome do Noivo (Completo)</label>
                    <input type="text" id="nomeNoivo" placeholder="Ex: Odesvaldo de Souza Matos Júnior">
                </div>
                <div class="form-group">
                    <label>Data e Horário do Início</label>
                    <input type="datetime-local" id="dataCasamento">
                </div>
                <div class="form-group">
                    <label>Local do Evento</label>
                    <input type="text" id="localCasamento" placeholder="Ex: Goiânia, GO">
                </div>
            </div>
        </div>

        <button class="btn-save" onclick="salvarAlteracoes()">Salvar Minha Identidade 💍</button>
    </div>

    <script>
        const _supabase = supabase.createClient('https://vuiqbdqnfnofwkpvvuqy.supabase.co', 'sb_publishable_LjKm4HF9kyD7m0ch3Eefdw_TJ5SG6w2');
        const emailLogado = localStorage.getItem('usuario_email');

        async function carregarPerfil() {
            if (!emailLogado) return;

            const { data, error } = await _supabase
                .from('usuarios')
                .select('*')
                .eq('email', emailLogado)
                .single();

            if (data) {
                document.getElementById('nomeNoiva').value = data.nome || "";
                document.getElementById('emailNoiva').value = data.email || "";
                document.getElementById('nomeNoivo').value = data.nome_noivo || "";
                document.getElementById('localCasamento').value = data.local_casamento || "";
                
                if (data.data_casamento) {
                    // Garante que o formato seja aceito pelo input datetime-local
                    document.getElementById('dataCasamento').value = data.data_casamento.substring(0, 16);
                }

                if (data.paleta_cores) {
                    document.getElementById('corPrincipal').value = data.paleta_cores;
                    document.getElementById('circleDisplay').style.backgroundColor = data.paleta_cores;
                }
            }
        }

        async function salvarAlteracoes() {
            // Pequena validação para evitar salvamentos vazios
            const nomeNoiva = document.getElementById('nomeNoiva').value;
            if (!nomeNoiva) {
                Swal.fire({ icon: 'warning', title: 'Atenção', text: 'O seu nome é obrigatório.' });
                return;
            }

            const corUnica = document.getElementById('corPrincipal').value;

            const dadosUpdate = {
                nome: nomeNoiva,
                nome_noivo: document.getElementById('nomeNoivo').value,
                data_casamento: document.getElementById('dataCasamento').value,
                local_casamento: document.getElementById('localCasamento').value,
                paleta_cores: corUnica 
            };

            const { error } = await _supabase
                .from('usuarios')
                .update(dadosUpdate)
                .eq('email', emailLogado);

            if (!error) {
                // Atualiza o nome no localStorage para refletir no Dashboard imediatamente
                localStorage.setItem('usuario_nome', nomeNoiva);
                
                Swal.fire({
                    icon: 'success',
                    title: 'Identidade Atualizada!',
                    text: 'Tudo pronto! Seu cronograma já reflete os novos detalhes.',
                    confirmButtonColor: '#EEABAB'
                });
            } else {
                console.error(error);
                Swal.fire({ icon: 'error', title: 'Erro ao salvar', text: 'Tente novamente em instantes.' });
            }
        }

        carregarPerfil();
    </script>
</body>
</html>
