<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist Premium | PlanejaNoiva</title>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
:root{
  --rose:#EEABAB;
  --rose-dark:#D98F8F;
  --text:#3F3932;
  --muted:#8F857A;
  --bg:#FBF6F1;
  --cream:#FFF9F4;
  --border:#EADFD6;
  --danger:#D9534F;
  --shadow:0 18px 50px rgba(63,57,50,.08);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  background:
    radial-gradient(circle at top left, rgba(238,171,171,.28), transparent 30%),
    linear-gradient(180deg,#FFF8F3,#FBF6F1);
  color:var(--text);
  min-height:100vh;
}

nav{
  height:76px;
  background:rgba(255,255,255,.85);
  backdrop-filter:blur(16px);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 5%;
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  z-index:10;
}

.nav-logo{height:46px;mix-blend-mode:multiply}

.btn-voltar{
  text-decoration:none;
  color:var(--text);
  font-weight:800;
  display:flex;
  align-items:center;
  gap:8px;
  background:white;
  border:1px solid var(--border);
  padding:11px 15px;
  border-radius:16px;
}

.container{
  max-width:980px;
  margin:34px auto;
  padding:0 20px 60px;
}

.hero{
  background:white;
  border:1px solid var(--border);
  border-radius:34px;
  padding:34px;
  box-shadow:var(--shadow);
  margin-bottom:24px;
}

.badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:var(--cream);
  color:var(--rose-dark);
  border:1px solid var(--border);
  padding:9px 13px;
  border-radius:999px;
  font-size:.82rem;
  font-weight:900;
  margin-bottom:16px;
}

.hero h1{
  font-family:'Playfair Display',serif;
  font-size:2.6rem;
  line-height:1.05;
}

.hero p{
  color:var(--muted);
  line-height:1.7;
  margin-top:10px;
}

.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
  margin-top:24px;
}

.stat{
  background:var(--cream);
  border:1px solid var(--border);
  border-radius:22px;
  padding:18px;
}

.stat strong{
  display:block;
  font-size:1.6rem;
  color:var(--rose-dark);
}

.stat span{
  color:var(--muted);
  font-size:.84rem;
  font-weight:800;
}

.progress-wrap{margin-top:22px}

.progress-top{
  display:flex;
  justify-content:space-between;
  font-weight:900;
  margin-bottom:10px;
}

.progress-bar{
  height:18px;
  background:#F0E6DD;
  border-radius:999px;
  overflow:hidden;
}

.progress-fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--rose),var(--rose-dark));
  border-radius:999px;
  transition:.3s;
}

.add-box{
  background:white;
  border:1px solid var(--border);
  border-radius:28px;
  padding:20px;
  box-shadow:0 12px 35px rgba(63,57,50,.045);
  display:flex;
  gap:12px;
  margin-bottom:22px;
}

.add-box input{
  flex:1;
  padding:15px 16px;
  border-radius:16px;
  border:1px solid var(--border);
  background:var(--cream);
  outline:none;
  font-size:1rem;
}

.add-box button{
  border:none;
  background:var(--rose);
  color:white;
  padding:0 22px;
  border-radius:16px;
  font-weight:900;
  cursor:pointer;
}

.add-box button:disabled{
  opacity:.7;
  cursor:not-allowed;
}

.task-list{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.task{
  background:white;
  border:1px solid var(--border);
  border-radius:22px;
  padding:18px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  box-shadow:0 10px 28px rgba(63,57,50,.04);
}

.task-left{
  display:flex;
  align-items:center;
  gap:13px;
  flex:1;
}

.check-btn{
  width:42px;
  height:42px;
  border-radius:15px;
  border:1px solid var(--border);
  background:var(--cream);
  color:var(--rose-dark);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}

.task-title{
  font-weight:800;
  line-height:1.4;
}

.task-status{
  display:block;
  margin-top:3px;
  color:var(--muted);
  font-size:.75rem;
  font-weight:800;
  text-transform:uppercase;
}

.task.done{
  border-color:rgba(238,171,171,.65);
  background:linear-gradient(135deg,#fff,#fff7f7);
}

.task.done .task-title{
  text-decoration:line-through;
  color:#aaa098;
}

.task.done .task-status{color:var(--rose-dark)}

.delete-btn{
  border:none;
  background:#FFF1F1;
  color:var(--danger);
  width:42px;
  height:42px;
  border-radius:15px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}

.empty{
  background:white;
  border:1px dashed var(--border);
  border-radius:24px;
  padding:28px;
  text-align:center;
  color:var(--muted);
}

@media(max-width:720px){
  .hero h1{font-size:2.1rem}
  .stats{grid-template-columns:1fr}
  .add-box{flex-direction:column}
  .add-box button{padding:15px}
  .task{align-items:flex-start}
}
</style>
</head>

<body>

<nav>
  <img src="https://vuiqbdqnfnofwkpvvuqy.supabase.co/storage/v1/object/public/logos/logo.png" class="nav-logo" alt="PlanejaNoiva">
  <a href="dashboard.html" class="btn-voltar">
    <span class="material-symbols-outlined">arrow_back</span>
    Painel
  </a>
</nav>

<div class="container">

  <section class="hero">
    <div class="badge">
      <span class="material-symbols-outlined">task_alt</span>
      Checklist premium
    </div>

    <h1>O plano elegante para não esquecer nenhum detalhe.</h1>
    <p>
      Marque fornecedores, decisões e preparativos importantes. Cada item concluído deixa o casamento mais perto de sair do papel.
    </p>

    <div class="stats">
      <div class="stat">
        <strong id="totalTarefas">0</strong>
        <span>Total de tarefas</span>
      </div>

      <div class="stat">
        <strong id="tarefasConcluidas">0</strong>
        <span>Concluídas</span>
      </div>

      <div class="stat">
        <strong id="tarefasPendentes">0</strong>
        <span>Pendentes</span>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-top">
        <span>Progresso do checklist</span>
        <span id="percentual">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress"></div>
      </div>
    </div>
  </section>

  <div class="add-box">
    <input type="text" id="nova" placeholder="Ex: confirmar horário da maquiagem...">
    <button id="btnAdicionar" onclick="add()">Adicionar</button>
  </div>

  <div id="lista" class="task-list"></div>

</div>

<script>
const supa = supabase.createClient(
  'https://vuiqbdqnfnofwkpvvuqy.supabase.co',
  'sb_publishable_LjKm4HF9kyD7m0ch3Eefdw_TJ5SG6w2'
);

let usuarioLogado = null;
let email = null;

const lista = document.getElementById('lista');
const nova = document.getElementById('nova');
const btnAdicionar = document.getElementById('btnAdicionar');

async function iniciarChecklist(){
  const { data, error } = await supa.auth.getSession();

  if(error || !data.session){
    localStorage.clear();
    window.location.href = 'index.html';
    return;
  }

  usuarioLogado = data.session.user;
  email = usuarioLogado.email;

  localStorage.setItem('usuario_email', email);

  await load();
}

function escaparHTML(texto){
  const div = document.createElement('div');
  div.innerText = texto || '';
  return div.innerHTML;
}

async function load(){
  const { data, error } = await supa
    .from('checklist')
    .select('*')
    .eq('usuario_email', email)
    .order('id', { ascending:true });

  if(error){
    Swal.fire({
      icon:'error',
      title:'Erro ao carregar',
      text:'Não conseguimos carregar seu checklist agora.',
      confirmButtonColor:'#EEABAB'
    });
    return;
  }

  if(!data || data.length === 0){
    await seed();
    return;
  }

  renderizar(data);
}

function renderizar(data){
  let html = '';
  let done = 0;

  data.forEach(t => {
    if(t.concluida) done++;

    html += `
      <div class="task ${t.concluida ? 'done' : ''}">
        <div class="task-left">
          <button class="check-btn" onclick="toggle(${t.id}, ${t.concluida})">
            <span class="material-symbols-outlined">
              ${t.concluida ? 'verified' : 'radio_button_unchecked'}
            </span>
          </button>

          <div>
            <span class="task-title">${escaparHTML(t.tarefa)}</span>
            <span class="task-status">${t.concluida ? 'Concluído' : 'Pendente'}</span>
          </div>
        </div>

        <button class="delete-btn" onclick="del(${t.id})">
          <span class="material-symbols-outlined">delete</span>
        </button>
      </div>
    `;
  });

  lista.innerHTML = html || `
    <div class="empty">
      Seu checklist ainda está vazio. Adicione o primeiro item para começar.
    </div>
  `;

  const total = data.length;
  const pendentes = total - done;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;

  document.getElementById('totalTarefas').innerText = total;
  document.getElementById('tarefasConcluidas').innerText = done;
  document.getElementById('tarefasPendentes').innerText = pendentes;
  document.getElementById('percentual').innerText = pct + '%';
  document.getElementById('progress').style.width = pct + '%';
}

async function add(){
  const valor = nova.value.trim();

  if(!valor){
    Swal.fire({
      icon:'warning',
      title:'Digite uma tarefa',
      text:'Adicione um item para entrar no checklist.',
      confirmButtonColor:'#EEABAB'
    });
    return;
  }

  btnAdicionar.disabled = true;
  btnAdicionar.innerText = 'Adicionando...';

  const { error } = await supa
    .from('checklist')
    .insert([{ tarefa: valor, usuario_email: email, concluida:false }]);

  btnAdicionar.disabled = false;
  btnAdicionar.innerText = 'Adicionar';

  if(error){
    Swal.fire({
      icon:'error',
      title:'Erro ao adicionar',
      text:'Não foi possível salvar essa tarefa.',
      confirmButtonColor:'#EEABAB'
    });
    return;
  }

  nova.value = '';
  await load();
}

async function del(id){
  const resultado = await Swal.fire({
    icon:'warning',
    title:'Remover item?',
    text:'Essa tarefa será apagada do checklist.',
    showCancelButton:true,
    confirmButtonText:'Sim, remover',
    cancelButtonText:'Cancelar',
    confirmButtonColor:'#D9534F',
    cancelButtonColor:'#EADFD6'
  });

  if(!resultado.isConfirmed) return;

  const { error } = await supa
    .from('checklist')
    .delete()
    .eq('id', id)
    .eq('usuario_email', email);

  if(error){
    Swal.fire({
      icon:'error',
      title:'Erro ao remover',
      text:'Não foi possível apagar essa tarefa.',
      confirmButtonColor:'#EEABAB'
    });
    return;
  }

  await load();
}

async function toggle(id, atual){
  const { error } = await supa
    .from('checklist')
    .update({ concluida: !atual })
    .eq('id', id)
    .eq('usuario_email', email);

  if(error){
    Swal.fire({
      icon:'error',
      title:'Erro ao atualizar',
      text:'Não foi possível alterar o status da tarefa.',
      confirmButtonColor:'#EEABAB'
    });
    return;
  }

  await load();
}

nova.addEventListener('keypress', function(e){
  if(e.key === 'Enter') add();
});

async function seed(){
  const tarefasIniciais = [
    '💍 Definir data oficial do casamento',
    '🏛️ Reservar local da cerimônia e recepção',
    '🍽️ Fechar buffet',
    '📸 Contratar fotografia e filmagem',
    '👗 Escolher vestido da noiva',
    '🎵 Definir música da cerimônia e festa',
    '💐 Escolher decoração e flores',
    '💌 Enviar convites',
    '🪑 Organizar lista de convidados',
    '🎂 Escolher bolo e doces',
    '🧾 Revisar orçamento final',
    '🕰️ Montar cronograma do grande dia'
  ].map(tarefa => ({
    tarefa,
    usuario_email: email,
    concluida: false
  }));

  const { error } = await supa.from('checklist').insert(tarefasIniciais);

  if(error){
    console.log('Erro ao criar checklist inicial:', error);
    renderizar([]);
    return;
  }

  await load();
}

iniciarChecklist();
</script>

</body>
</html>
