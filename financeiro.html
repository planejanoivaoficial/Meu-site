<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Financeira | PlanejaNoiva</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #F7EFE4; color: #4A453E; padding-bottom: 50px; }
        
        /* Navegação */
        nav { background: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 15px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; }
        .nav-logo { height: 45px; mix-blend-mode: multiply; }
        .btn-voltar { color: #EEABAB; text-decoration: none; font-weight: 700; font-size: 0.9rem; display: flex; align-items: center; gap: 5px; }

        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        
        /* Cards de Resumo */
        .resumo-financeiro { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card-valor { background: white; padding: 25px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.03); border: 2px solid transparent; }
        .card-limite { border-color: #EEABAB; background: #FFF9F9; }
        .card-valor label { display: block; font-size: 0.7rem; font-weight: 700; color: #B2ACA3; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }
        .card-valor span { font-size: 1.4rem; font-weight: 700; color: #4A453E; }
        .card-valor input { width: 100%; border: none; text-align: center; font-size: 1.4rem; font-weight: 700; color: #EEABAB; outline: none; background: transparent; }

        /* Formulário de Lançamento */
        .add-financeiro-area { background: white; padding: 30px; border-radius: 25px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); display: flex; flex-wrap: wrap; gap: 15px; align-items: flex-end; }
        .form-group { flex: 1; min-width: 150px; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 700; margin-bottom: 8px; color: #8C857B; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid #E5DED5; border-radius: 12px; outline: none; background: #FCF9F5; font-size: 0.9rem; color: #4A453E; }
        .btn-add { background: #EEABAB; color: white; border: none; padding: 0 30px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; height: 48px; }
        .btn-add:hover { background: #e59a9a; transform: translateY(-2px); }

        /* Tabela Premium */
        .list-card { background: white; border-radius: 25px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #FCF9F5; padding: 18px 20px; text-align: left; font-size: 0.7rem; text-transform: uppercase; color: #B2ACA3; font-weight: 700; letter-spacing: 1px; }
        td { padding: 20px; border-top: 1px solid #F7EFE4; font-size: 0.9rem; color: #4A453E; }
        .tag-metodo { background: #F7EFE4; padding: 4px 10px; border-radius: 8px; font-size: 0.75rem; font-weight: 600; color: #8C857B; }
        .btn-del { color: #F0E9E0; border: none; background: none; cursor: pointer; transition: 0.2s; }
        .btn-del:hover { color: #EF4444; }

        /* Chrome, Safari, Edge, Opera - Remove setas do input number */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        /* Isso arruma o visual do campo de orçamento */
.orcamento-input-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
}

.currency-prefix {
    font-size: 1.4rem;
    font-weight: 700;
    color: #EEABAB;
}

#orcamentoLimite {
    width: 120px !important;
    border: none !important;
    background: transparent !important;
    font-size: 1.4rem !important;
    font-weight: 700 !important;
    color: #EEABAB !important;
    outline: none;
    padding: 0 !important;
    margin: 0 !important;
}
    </style>
</head>
<body>

    <nav>
        <img src="https://i.ibb.co/YTTQXBx8/Logo-Planeja-Noiva.png" class="nav-logo">
        <a href="dashboard.html" class="btn-voltar">
            <span class="material-symbols-outlined">arrow_back</span> Voltar ao Painel
        </a>
    </nav>

    <div class="container">
        <div class="resumo-financeiro">
            <div class="card-valor card-limite">
    <label>Meu Orçamento Limite</label>
    <div class="orcamento-input-container">
        <span class="currency-prefix">R$</span>
        <input type="number" id="orcamentoLimite" onchange="salvarLimite()" placeholder="0,00">
    </div>
</div>
            <div class="card-valor">
                <label>Total Contratado</label>
                <span id="totalGeral">R$ 0,00</span>
            </div>
            <div class="card-valor">
                <label>Total Pago</label>
                <span id="totalPago" style="color: #10B981;">R$ 0,00</span>
            </div>
            <div class="card-valor">
                <label>Saldo do Orçamento</label>
                <span id="saldoOrcamento">R$ 0,00</span>
            </div>
        </div>

        <div class="add-financeiro-area">
            <div class="form-group" style="flex: 2;">
                <label>Fornecedor / Serviço</label>
                <input type="text" id="servico" placeholder="Ex: Buffet, Fotografia...">
            </div>
            <div class="form-group">
                <label>Vlr. Contrato</label>
                <input type="number" id="valorTotal" step="0.01" placeholder="0.00">
            </div>
            <div class="form-group">
                <label>Vlr. Pago</label>
                <input type="number" id="valorPago" step="0.01" placeholder="0.00">
            </div>
            <div class="form-group">
                <label>Método</label>
                <select id="metodoPagamento">
                    <option value="Pix">Pix</option>
                    <option value="Cartão">Cartão</option>
                    <option value="Boleto">Boleto</option>
                    <option value="Dinheiro">Dinheiro</option>
                </select>
            </div>
            <button class="btn-add" onclick="adicionarGasto()">Lançar</button>
        </div>

        <div class="list-card">
            <table>
                <thead>
                    <tr>
                        <th>Fornecedor</th>
                        <th>Método</th>
                        <th>Total</th>
                        <th>Pago</th>
                        <th>Saldo Devedor</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="corpoFinanceiro"></tbody>
            </table>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://vuiqbdqnfnofwkpvvuqy.supabase.co', 'sb_publishable_LjKm4HF9kyD7m0ch3Eefdw_TJ5SG6w2');
        const email = localStorage.getItem('usuario_email');

        async function carregarFinanceiro() {
            const { data: gastos } = await _supabase.from('financeiro').select('*').eq('usuario_email', email).order('id', { ascending: false });
            const { data: user } = await _supabase.from('usuarios').select('limite_gastos').eq('email', email).single();
            
            const limite = user?.limite_gastos || 0;
            document.getElementById('orcamentoLimite').value = limite;

            const corpo = document.getElementById('corpoFinanceiro');
            corpo.innerHTML = "";
            let tGeral = 0, tPago = 0;

            gastos.forEach(item => {
                const aPagar = item.valor_total - item.valor_pago;
                tGeral += item.valor_total;
                tPago += item.valor_pago;

                corpo.innerHTML += `
                    <tr>
                        <td style="font-weight:700; text-transform: capitalize;">${item.servico}</td>
                        <td><span class="tag-metodo">${item.metodo || 'Pix'}</span></td>
                        <td>R$ ${item.valor_total.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
                        <td style="color: #10B981">R$ ${item.valor_pago.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
                        <td style="font-weight:700; color: ${aPagar > 0 ? '#EEABAB' : '#10B981'}">
                            R$ ${aPagar.toLocaleString('pt-BR', {minimumFractionDigits: 2})}
                        </td>
                        <td>
                            <button class="btn-del" onclick="excluirGasto(${item.id})">
                                <span class="material-symbols-outlined">delete</span>
                            </button>
                        </td>
                    </tr>
                `;
            });

            const saldoFinal = limite - tGeral;
            document.getElementById('totalGeral').innerText = `R$ ${tGeral.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            document.getElementById('totalPago').innerText = `R$ ${tPago.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            
            const elementoSaldo = document.getElementById('saldoOrcamento');
            elementoSaldo.innerText = `R$ ${saldoFinal.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            elementoSaldo.style.color = saldoFinal < 0 ? "#EF4444" : "#10B981";
        }

        async function adicionarGasto() {
            const serv = document.getElementById('servico').value;
            const vTotal = parseFloat(document.getElementById('valorTotal').value);
            const vPago = parseFloat(document.getElementById('valorPago').value) || 0;
            const met = document.getElementById('metodoPagamento').value;

            if (!serv || isNaN(vTotal)) { alert("Preencha o fornecedor e o valor total!"); return; }

            await _supabase.from('financeiro').insert([{ 
                servico: serv, valor_total: vTotal, valor_pago: vPago, metodo: met, usuario_email: email 
            }]);

            document.getElementById('servico').value = "";
            document.getElementById('valorTotal').value = "";
            document.getElementById('valorPago').value = "";
            carregarFinanceiro();
        }

        async function salvarLimite() {
            const novoLimite = parseFloat(document.getElementById('orcamentoLimite').value) || 0;
            await _supabase.from('usuarios').update({ limite_gastos: novoLimite }).eq('email', email);
            carregarFinanceiro();
        }

        async function excluirGasto(id) {
            if (confirm("Remover este lançamento?")) {
                await _supabase.from('financeiro').delete().eq('id', id);
                carregarFinanceiro();
            }
        }

        carregarFinanceiro();
    </script>
</body>
</html>
