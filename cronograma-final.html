<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Cronograma Oficial | PlanejaNoiva</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
  --cor-tema:#EEABAB;
  --texto:#3F3932;
  --muted:#8F857A;
  --bg:#FDF9F6;
  --paper:#FFFDFB;
  --line:rgba(63,57,50,.10);
  --shadow:0 28px 80px rgba(63,57,50,.08);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,
body{
  width:100%;
  overflow-x:hidden;
}

body{
  min-height:100vh;
  padding:54px 22px 70px;

  background:
    radial-gradient(
      circle at 12% 8%,
      color-mix(
        in srgb,
        var(--cor-tema) 16%,
        transparent
      ),
      transparent 30%
    ),

    radial-gradient(
      circle at 88% 12%,
      rgba(212,175,55,.10),
      transparent 26%
    ),

    linear-gradient(
      180deg,
      #FFFDFC,
      #F8F0EA
    );

  color:var(--texto);
  font-family:'Cormorant Garamond',serif;
}

body::before{
  content:"";
  position:fixed;
  inset:0;

  background:url(
    "https://www.transparenttextures.com/patterns/natural-paper.png"
  );

  opacity:.32;
  z-index:-2;
}

body::after{
  content:"";
  position:fixed;

  width:640px;
  height:640px;

  border-radius:50%;

  background:
    radial-gradient(
      circle,
      color-mix(
        in srgb,
        var(--cor-tema) 22%,
        transparent
      ),
      transparent 68%
    );

  filter:blur(6px);

  opacity:.42;

  top:-300px;
  left:50%;

  transform:translateX(-50%);

  z-index:-1;
}

.page{
  width:100%;
  max-width:980px;
  margin:0 auto;
}

.hero{
  position:relative;

  text-align:center;

  padding:54px 36px 48px;

  margin-bottom:36px;

  border-radius:42px;

  background:
    linear-gradient(
      180deg,
      rgba(255,255,255,.88),
      rgba(255,250,247,.68)
    );

  border:1px solid rgba(234,223,214,.72);

  box-shadow:var(--shadow);

  overflow:hidden;
}

.hero::before{
  content:"";

  position:absolute;

  width:360px;
  height:360px;

  border-radius:50%;

  border:1px solid
    color-mix(
      in srgb,
      var(--cor-tema) 30%,
      transparent
    );

  top:-190px;
  right:-110px;
}

.hero::after{
  content:"";

  position:absolute;

  width:240px;
  height:240px;

  border-radius:50%;

  background:
    color-mix(
      in srgb,
      var(--cor-tema) 10%,
      transparent
    );

  bottom:-150px;
  left:-90px;
}

.logo{
  position:relative;
  z-index:2;

  height:86px;

  margin-bottom:18px;

  mix-blend-mode:multiply;

  opacity:.92;
}

.kicker{
  position:relative;
  z-index:2;

  font-family:'Montserrat',sans-serif;

  font-size:.66rem;
  font-weight:700;

  letter-spacing:5px;

  text-transform:uppercase;

  color:var(--muted);

  margin-bottom:20px;
}

.names{
  position:relative;
  z-index:2;

  font-size:clamp(3rem,8vw,5.6rem);

  font-weight:300;
  font-style:italic;

  line-height:.96;

  color:var(--cor-tema);

  letter-spacing:-2px;

  margin-bottom:24px;
}

.details{
  position:relative;
  z-index:2;

  display:flex;

  justify-content:center;
  align-items:center;

  flex-wrap:wrap;

  gap:14px;

  font-family:'Montserrat',sans-serif;

  font-size:.76rem;
  font-weight:700;

  letter-spacing:3.5px;

  text-transform:uppercase;

  color:rgba(63,57,50,.72);
}

.detail-dot{
  width:5px;
  height:5px;

  border-radius:50%;

  background:var(--cor-tema);

  opacity:.8;
}

.location{
  position:relative;
  z-index:2;

  margin-top:15px;

  font-family:'Montserrat',sans-serif;

  font-size:.72rem;
  font-weight:600;

  letter-spacing:3px;

  text-transform:uppercase;

  color:rgba(63,57,50,.52);
}

.seal-wrap{
  position:relative;
  z-index:2;

  display:flex;

  align-items:center;
  justify-content:center;

  gap:18px;

  margin:30px auto 26px;

  max-width:430px;
}

.seal-line{
  height:1px;
  flex:1;

  background:
    linear-gradient(
      90deg,
      transparent,
      var(--cor-tema),
      transparent
    );

  opacity:.72;
}

.seal{
  width:24px;
  height:24px;

  border-radius:50%;

  background:var(--cor-tema);

  box-shadow:
    0 0 0 11px
      color-mix(
        in srgb,
        var(--cor-tema) 12%,
        transparent
      ),

    0 14px 36px
      color-mix(
        in srgb,
        var(--cor-tema) 28%,
        transparent
      );
}

.tag{
  position:relative;
  z-index:2;

  display:inline-flex;

  align-items:center;
  justify-content:center;

  padding:13px 42px;

  border-top:1px solid var(--cor-tema);
  border-bottom:1px solid var(--cor-tema);

  font-family:'Montserrat',sans-serif;

  font-size:.64rem;
  font-weight:700;

  letter-spacing:5px;

  text-transform:uppercase;

  color:rgba(63,57,50,.82);
}

.location-section{
  margin-bottom:42px;

  display:grid;

  grid-template-columns:repeat(2,1fr);

  gap:18px;
}

.place-card{
  position:relative;

  background:
    linear-gradient(
      135deg,
      rgba(255,255,255,.94),
      rgba(255,248,245,.82)
    );

  border:1px solid rgba(234,223,214,.82);

  border-radius:34px;

  padding:26px;

  box-shadow:
    0 18px 55px rgba(63,57,50,.055);

  overflow:hidden;
}

.place-card::after{
  content:"";

  position:absolute;

  width:170px;
  height:170px;

  border-radius:50%;

  right:-80px;
  top:-90px;

  background:
    color-mix(
      in srgb,
      var(--cor-tema) 9%,
      transparent
    );
}

.place-card > *{
  position:relative;
  z-index:1;
}

.place-label{
  font-family:'Montserrat',sans-serif;

  font-size:.66rem;
  font-weight:800;

  letter-spacing:3px;

  text-transform:uppercase;

  color:var(--cor-tema);

  margin-bottom:12px;

  display:flex;

  align-items:center;

  gap:8px;
}

.place-title{
  font-family:'Cormorant Garamond',serif;

  font-size:2rem;

  font-style:italic;

  line-height:1.05;

  color:rgba(63,57,50,.9);
}

.place-address{
  font-family:'Montserrat',sans-serif;

  color:rgba(63,57,50,.56);

  font-size:.82rem;

  line-height:1.7;

  margin-top:10px;
}

.route-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:18px;
}

.route-btn{
  text-decoration:none;
  border-radius:999px;
  padding:12px 16px;

  font-family:'Montserrat',sans-serif;

  font-size:.66rem;
  letter-spacing:1.5px;

  text-transform:uppercase;

  font-weight:800;

  display:inline-flex;

  align-items:center;
  justify-content:center;

  gap:7px;

  transition:.25s;
}

.route-btn:hover{
  transform:translateY(-2px);
}

.route-btn.google{
  background:white;
  border:1px solid rgba(234,223,214,.95);
  color:var(--texto);
}

.route-btn.waze{
  background:#EAF7FF;
  border:1px solid #CDEEFE;
  color:#1976A3;
}

.timeline-shell{
  position:relative;

  width:100%;
  max-width:900px;

  margin:0 auto;
}

.timeline-shell::before{
  content:"";

  position:absolute;

  left:34px;
  top:0;
  bottom:0;

  width:1px;

  background:
    linear-gradient(
      180deg,
      transparent,
      var(--cor-tema),
      transparent
    );

  opacity:.38;
}

.timeline{
  display:flex;
  flex-direction:column;
  gap:24px;
}

.item{
  position:relative;
  padding-left:92px;

  animation:fadeUp .7s ease both;
}

.dot{
  position:absolute;

  left:22px;
  top:50%;

  transform:translateY(-50%);

  width:26px;
  height:26px;

  border-radius:50%;

  background:var(--cor-tema);

  box-shadow:
    0 0 0 9px
      color-mix(
        in srgb,
        var(--cor-tema) 12%,
        transparent
      ),

    0 16px 34px rgba(63,57,50,.08);
}

.card{
  position:relative;

  display:grid;

  grid-template-columns:130px 1fr;

  align-items:center;

  gap:26px;

  min-height:104px;

  padding:26px 34px;

  border-radius:34px;

  background:
    linear-gradient(
      135deg,
      rgba(255,255,255,.92),
      rgba(255,250,247,.76)
    );

  border:1px solid rgba(234,223,214,.78);

  box-shadow:
    0 18px 55px rgba(63,57,50,.055);

  overflow:hidden;
}

.card::after{
  content:"";

  position:absolute;

  right:-60px;
  top:-80px;

  width:170px;
  height:170px;

  border-radius:50%;

  background:
    color-mix(
      in srgb,
      var(--cor-tema) 8%,
      transparent
    );
}

.time{
  position:relative;
  z-index:2;

  font-family:'Montserrat',sans-serif;

  color:var(--cor-tema);

  font-size:1rem;
  font-weight:800;

  letter-spacing:1px;

  text-transform:uppercase;
}

.desc{
  position:relative;
  z-index:2;

  text-align:right;

  font-size:1.9rem;

  font-style:italic;

  font-weight:400;

  line-height:1.12;

  color:rgba(63,57,50,.86);
}

.loading,
.empty{
  padding:42px 30px;

  text-align:center;

  border-radius:32px;

  background:rgba(255,255,255,.75);

  border:1px dashed rgba(63,57,50,.13);

  color:rgba(63,57,50,.48);

  font-size:1.65rem;

  font-style:italic;
}

.actions{
  display:flex;
  justify-content:center;
  margin-top:54px;
}

.btn{
  border:none;

  padding:15px 44px;

  border-radius:999px;

  background:var(--texto);

  color:white;

  font-family:'Montserrat',sans-serif;

  font-size:.66rem;
  font-weight:800;

  letter-spacing:3.5px;

  text-transform:uppercase;

  cursor:pointer;

  box-shadow:
    0 18px 38px rgba(63,57,50,.14);

  transition:.28s;
}

.btn:hover{
  transform:translateY(-2px);
  background:var(--cor-tema);
}

.footer{
  margin-top:32px;

  text-align:center;

  font-family:'Montserrat',sans-serif;

  font-size:.62rem;
  font-weight:600;

  letter-spacing:3px;

  text-transform:uppercase;

  color:rgba(63,57,50,.38);
}

@keyframes fadeUp{

  from{
    opacity:0;
    transform:translateY(18px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }
}

@media(max-width:720px){

  body{
    padding:22px 12px 52px;
  }

  .hero{
    padding:40px 20px 34px;
    border-radius:30px;
  }

  .logo{
    height:68px;
  }

  .names{
    font-size:2.8rem;
    margin-bottom:18px;
  }

  .details{
    flex-direction:column;
    gap:8px;
    letter-spacing:2px;
  }

  .detail-dot{
    display:none;
  }

  .tag{
    width:100%;
    padding:12px 20px;
    letter-spacing:3px;
  }

  .location-section{
    grid-template-columns:1fr;
  }

  .place-card{
    border-radius:28px;
    padding:22px;
  }

  .place-title{
    font-size:1.7rem;
  }

  .route-actions{
    flex-direction:column;
  }

  .route-btn{
    width:100%;
  }

  .timeline-shell::before{
    left:16px;
  }

  .item{
    padding-left:46px;
  }

  .dot{
    left:4px;
    width:22px;
    height:22px;
  }

  .card{
    grid-template-columns:1fr;
    gap:12px;
    padding:22px 18px;
    border-radius:26px;
  }

  .time{
    font-size:.84rem;
  }

  .desc{
    text-align:left;
    font-size:1.55rem;
  }

  .btn{
    width:100%;
  }
}

    padding-top:16mm !important;
  }

  .timeline-shell::before{

  }

  .timeline{

    flex-direction:column !important;

    page-break-inside:avoid !important;
  }

  .time{
    font-size:13px !important;

    line-height:1.5 !important;

    white-space:nowrap !important;
  }

  .desc{
    text-align:left !important;

    font-size:23px !important;

    line-height:1.22 !important;

    overflow:visible !important;
  }

  .actions,
  .footer{
    display:none !important;
  }
}

</style>

</head>

<body>

<main class="page">

<section class="hero">

<img
src="https://vuiqbdqnfnofwkpvvuqy.supabase.co/storage/v1/object/public/logos/logo.png"
class="logo"
alt="PlanejaNoiva"
>

<div class="kicker">
PlanejaNoiva apresenta
</div>

<div class="names" id="nomes">
Carregando...
</div>

<div class="details">

<span id="dataHora"></span>

<span class="detail-dot"></span>

<span id="localHero">
Local da cerimônia
</span>

</div>

<div class="location" id="local"></div>

<div class="seal-wrap">
<div class="seal-line"></div>
<div class="seal"></div>
<div class="seal-line"></div>
</div>

<div class="tag">
Cronograma Oficial
</div>

</section>

<section
class="location-section"
id="locaisSection"
style="display:none;"
></section>

<section class="timeline-shell">

<div class="timeline" id="lista">

<div class="loading">
Carregando cronograma...
</div>

</div>

</section>

<div class="actions">

<button
class="btn"
onclick="window.print()"
>
Exportar PDF
</button>

</div>

<div class="footer">
PlanejaNoiva • Organização elegante para o grande dia
</div>

</main>

<script>

const supa = supabase.createClient(
'https://vuiqbdqnfnofwkpvvuqy.supabase.co',
'sb_publishable_LjKm4HF9kyD7m0ch3Eefdw_TJ5SG6w2'
);

const params =
new URLSearchParams(window.location.search);

const emailParam =
params.get('noiva');

const token =
params.get('token');

let dataCasamentoUsuario = null;

function escaparHTML(texto){

const div =
document.createElement('div');

div.innerText = texto || '';

return div.innerHTML;
}

function partesDataLocal(valor){

const texto =
String(valor || '');

return{
ano:texto.substring(0,4),
mes:texto.substring(5,7),
dia:texto.substring(8,10),
hora:texto.substring(11,16) || '00:00'
};
}

function formatarDataCasamento(valor){

const p =
partesDataLocal(valor);

if(!p.ano) return '';

return `${p.dia}/${p.mes}/${p.ano} • ${p.hora}H`;
}

function minutoCasamentoLocal(){

if(!dataCasamentoUsuario)
return null;

const hora =
partesDataLocal(
dataCasamentoUsuario
).hora;

const [h,m] =
hora.split(':').map(Number);

return (h * 60) + (m || 0);
}

function minutosDoHorario(horaTexto){

const [h,m] =
String(horaTexto || '00:00')
.substring(0,5)
.split(':')
.map(Number);

return (h * 60) + (m || 0);
}

function horarioOrdenavel(horaTexto){

const minutos =
minutosDoHorario(horaTexto);

const minutoCasamento =
minutoCasamentoLocal();

if(minutoCasamento === null){
return minutos;
}

const inicioRoteiro =
minutoCasamento - 420;

if(minutos < inicioRoteiro){
return minutos + 1440;
}

return minutos;
}

function textoBusca(local,endereco){

return [local,endereco]
.map(v => String(v || '').trim())
.filter(Boolean)
.join(', ');
}

function gerarLinkGoogleMaps(busca){

const q =
encodeURIComponent(busca || '');

return q
? `https://www.google.com/maps/search/?api=1&query=${q}`
: '#';
}

function gerarLinkWaze(busca){

const q =
encodeURIComponent(busca || '');

return q
? `https://waze.com/ul?q=${q}&navigate=yes`
: '#';
}

function criarCardLocal(
tipo,
icone,
local,
endereco
){

const busca =
textoBusca(local,endereco);

if(!busca) return '';

return `
<article class="place-card">

<div class="place-label">

<span class="material-symbols-outlined">
${icone}
</span>

${tipo}

</div>

<div class="place-title">
${escaparHTML(local || endereco)}
</div>

${endereco
? `
<div class="place-address">
${escaparHTML(endereco)}
</div>
`
: ''
}

<div class="route-actions">

<a
class="route-btn google"
href="${gerarLinkGoogleMaps(busca)}"
target="_blank"
>

<span class="material-symbols-outlined">
map
</span>

Google Maps

</a>

<a
class="route-btn waze"
href="${gerarLinkWaze(busca)}"
target="_blank"
>

<span class="material-symbols-outlined">
near_me
</span>

Waze

</a>

</div>

</article>
`;
}

function usuarioTemRecepcao(user){

return(
user.tem_recepcao === true ||
user.tem_recepcao === 'true' ||
user.tem_recepcao === 1
);
}

function renderizarLocais(user){

const section =
document.getElementById(
'locaisSection'
);

const localCerimonia =
user.local_cerimonia || '';

const enderecoCerimonia =
user.endereco_cerimonia || '';

const temRecepcao =
usuarioTemRecepcao(user);

const localRecepcao =
temRecepcao
? (user.local_recepcao || '')
: '';

const enderecoRecepcao =
temRecepcao
? (user.endereco_recepcao || '')
: '';

let html = '';

html += criarCardLocal(
'Cerimônia',
'church',
localCerimonia,
enderecoCerimonia
);

if(temRecepcao){

html += criarCardLocal(
'Recepção',
'celebration',
localRecepcao,
enderecoRecepcao
);
}

if(html){

section.innerHTML = html;
section.style.display = 'grid';

}else{

section.style.display = 'none';
}
}

async function buscarEmailPublico(){

if(emailParam){
return decodeURIComponent(emailParam);
}

if(token){

const { data:config } =
await supa
.from('mesas_assentos')
.select('usuario_email')
.eq('public_token', token)
.maybeSingle();

if(config?.usuario_email){
return config.usuario_email;
}
}

return null;
}

async function load(){

const lista =
document.getElementById('lista');

const emailNoiva =
await buscarEmailPublico();

if(!emailNoiva){

lista.innerHTML = `
<div class="empty">
Link inválido
</div>
`;

return;
}

 const emailBusca =
  String(emailNoiva || '')
  .replace('%40','@')
  .trim()
  .toLowerCase();

console.log(
  'EMAIL BUSCA:',
  emailBusca
);

const { data:usuarios, error:userError } =
await supa
.from('usuarios')
.select('*')
.or(
  `email.eq.${emailBusca},email.ilike.${emailBusca}`
)
.order('created_at', {
  ascending:false
})
.limit(1);

if(userError){

  console.error(
    'Erro ao buscar usuário:',
    userError
  );
}

const user =
usuarios && usuarios.length
? usuarios[0]
: null;

console.log(
  'USER ENCONTRADO:',
  user
);

console.log('USER ENCONTRADO:', user);

if(user){

  dataCasamentoUsuario =
  user.data_hora_cerimonia ||
  user.data_casamento ||
  null;

const localPrincipal =
user.local_cerimonia ||
user.local_casamento ||
'Local da cerimônia';

document.getElementById('nomes').innerText =
`${user.nome || 'Noiva'} & ${user.nome_noivo || 'Noivo'}`;

document.getElementById('dataHora').innerText =
dataCasamentoUsuario
? formatarDataCasamento(dataCasamentoUsuario)
: '';

document.getElementById('localHero').innerText =
localPrincipal;

document.getElementById('local').innerText =
localPrincipal;

if(user.paleta_cores){

document.documentElement.style.setProperty(
'--cor-tema',
user.paleta_cores
);
}

renderizarLocais(user);
}

const { data:crono, error } =
await supa
.from('cronograma')
.select('*')
.eq(
  'usuario_email',
  emailBusca
)
if(error){

lista.innerHTML = `
<div class="empty">
Erro ao carregar cronograma
</div>
`;

return;
}

if(!crono || crono.length === 0){

lista.innerHTML = `
<div class="empty">
A definir o roteiro dos sonhos...
</div>
`;

return;
}

const ordenado =
[...crono].sort((a,b)=>{
return horarioOrdenavel(a.hora)
- horarioOrdenavel(b.hora);
});

let html = '';

ordenado.forEach((item,index)=>{

html += `
<article
class="item"
style="animation-delay:${index * .05}s"
>

<div class="dot"></div>

<div class="card">

<div class="time">
${
escaparHTML(
(item.hora || '')
.substring(0,5)
)
}h
</div>

<div class="desc">
${escaparHTML(item.descricao)}
</div>

</div>

</article>
`;
});

lista.innerHTML = html;
}

load().catch(err => {
  console.error(err);

  document.getElementById('lista').innerHTML = `
    <div class="empty">
      Erro ao carregar cronograma
    </div>
  `;
});

</script>

</body>
</html>
