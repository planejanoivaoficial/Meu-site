<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fornecedores Premium | PlanejaNoiva</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
body{
font-family:'Inter';
background:linear-gradient(180deg,#FFF8F3,#FBF6F1);
color:#3F3932;
}

.container{
max-width:1100px;
margin:40px auto;
padding:20px;
}

/* HEADER */
.header{
background:white;
padding:30px;
border-radius:25px;
margin-bottom:30px;
}

h1{
font-family:'Playfair Display';
font-size:2.5rem;
}

.subtitle{
color:#8F857A;
margin-top:10px;
}

/* FORM */
.form{
background:white;
padding:25px;
border-radius:20px;
margin-bottom:30px;
display:grid;
gap:15px;
}

.inputs{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:10px;
}

input{
padding:14px;
border-radius:10px;
border:1px solid #EADFD6;
background:#FCF9F5;
}

.btn{
background:#EEABAB;
color:white;
border:none;
padding:15px;
border-radius:12px;
font-weight:700;
cursor:pointer;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

/* CARD */
.card{
background:white;
padding:20px;
border-radius:20px;
position:relative;
border-left:5px solid #EEABAB;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.cat{
font-size:0.7rem;
font-weight:700;
color:#EEABAB;
text-transform:uppercase;
}

.nome{
font-size:1.2rem;
font-weight:700;
margin:10px 0;
}

/* ACTIONS */
.actions{
display:flex;
gap:10px;
margin-top:15px;
}

.wpp{
flex:1;
background:#25D366;
color:white;
padding:10px;
border-radius:10px;
text-align:center;
text-decoration:none;
font-weight:600;
}

.del{
position:absolute;
top:15px;
right:15px;
cursor:pointer;
color:#ccc;
}

.del:hover{
color:#EF4444;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>Seus Fornecedores 💐</h1>
<p class="subtitle">Organize todos os profissionais do seu casamento em um só lugar</p>
</div>

<div class="form">
<div class="inputs">
<input type="text" id="nome" placeholder="Nome do fornecedor">
<input type="text" id="categoria" placeholder="Categoria (ex: fotógrafo)">
<input type="text" id="telefone" placeholder="WhatsApp com DDD">
</div>
<button class="btn" onclick="add()">Salvar fornecedor</button>
</div>

<div class="grid" id="lista"></div>

</div>

<script>
const supa = supabase.createClient(
'https://vuiqbdqnfnofwkpvvuqy.supabase.co',
'sb_publishable_LjKm4HF9kyD7m0ch3Eefdw_TJ5SG6w2'
);

const email = localStorage.getItem('usuario_email');

async function load(){
let {data} = await supa.from('fornecedores')
.select('*')
.eq('usuario_email',email)
.order('id',{ascending:false});

let html="";

data.forEach(f=>{
html+=`
<div class="card">
<span class="del" onclick="del(${f.id})">🗑</span>

<div class="cat">${f.categoria || 'Serviço'}</div>
<div class="nome">${f.nome}</div>

<div class="actions">
<a href="https://wa.me/55${f.telefone}" target="_blank" class="wpp">
WhatsApp
</a>
</div>
</div>`;
});

document.getElementById('lista').innerHTML=html;
}

async function add(){
let nome=document.getElementById('nome').value;
let categoria=document.getElementById('categoria').value;
let telefone=document.getElementById('telefone').value;

if(!nome || !categoria || !telefone){
Swal.fire("Preencha tudo ✨");
return;
}

await supa.from('fornecedores').insert([{
nome,
categoria,
telefone,
usuario_email:email
}]);

Swal.fire("Salvo 💐");

document.getElementById('nome').value="";
document.getElementById('categoria').value="";
document.getElementById('telefone').value="";

load();
}

async function del(id){
const confirm = await Swal.fire({
title:"Remover fornecedor?",
showCancelButton:true,
confirmButtonText:"Sim"
});

if(confirm.isConfirmed){
await supa.from('fornecedores').delete().eq('id',id);
load();
}
}

load();
</script>

</body>
</html>
