<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cronograma Oficial | PlanejaNoiva</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,400&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
--cor-tema:#EEABAB;
--texto:#4A453E;
--bg:#FDF9F6;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
background:var(--bg);
color:var(--texto);
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding:70px 20px;
font-family:'Cormorant Garamond',serif;
}

/* textura */
body::before{
content:"";
position:fixed;
inset:0;
background:url("https://www.transparenttextures.com/patterns/natural-paper.png");
opacity:.4;
z-index:-1;
}

/* HEADER */
.header{
text-align:center;
max-width:700px;
margin-bottom:60px;
animation:fade .8s ease;
}

.logo{
height:110px;
margin-bottom:15px;
mix-blend-mode:multiply;
}

.names{
font-size:clamp(2.8rem,7vw,3.8rem);
font-style:italic;
font-weight:400;
line-height:1.1;
margin-bottom:10px;
transition:.4s;
}

.info{
font-family:'Montserrat';
font-size:.75rem;
letter-spacing:4px;
text-transform:uppercase;
line-height:1.9;
font-weight:600;
}

.local{
font-size:.7rem;
opacity:.6;
letter-spacing:2px;
}

.seal{
width:16px;
height:16px;
border-radius:50%;
margin:22px auto;
border:1px solid rgba(0,0,0,.1);
}

.tag{
font-family:'Montserrat';
font-size:.65rem;
letter-spacing:5px;
text-transform:uppercase;
padding:12px 40px;
border-top:1px solid rgba(0,0,0,.1);
border-bottom:1px solid rgba(0,0,0,.1);
display:inline-block;
margin-top:10px;
}

/* TIMELINE */
.timeline{
width:100%;
max-width:600px;
}

.item{
display:flex;
justify-content:space-between;
align-items:baseline;
margin-bottom:30px;
padding-bottom:10px;
border-bottom:.5px solid rgba(0,0,0,.05);
animation:fadeUp .6s ease;
}

.time{
font-family:'Montserrat';
font-size:.95rem;
font-weight:600;
min-width:90px;
}

.desc{
font-size:1.6rem;
text-align:right;
font-style:italic;
flex:1;
}

/* EMPTY */
.empty{
text-align:center;
opacity:.4;
font-style:italic;
margin-top:30px;
}

/* BOTÃO */
.btn{
margin-top:70px;
background:transparent;
border:1px solid var(--texto);
padding:12px 35px;
font-family:'Montserrat';
font-size:.6rem;
letter-spacing:3px;
text-transform:uppercase;
cursor:pointer;
opacity:.5;
transition:.3s;
}

.btn:hover{
opacity:1;
background:var(--texto);
color:white;
}

/* animações */
@keyframes fade{
from{opacity:0}
to{opacity:1}
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(15px)}
to{opacity:1;transform:translateY(0)}
}

@media print{
.btn{display:none}
body{padding:30px;background:white}
}
</style>
</head>

<body>

<div class="header">

<img src="https://i.ibb.co/YTTQXBx8/Logo-Planeja-Noiva.png" class="logo">

<div class="names" id="nomes">Carregando...</div>

<div class="info">
<span id="dataHora"></span><br>
<span class="local" id="local"></span>
</div>

<div class="seal" id="selo"></div>

<div class="tag" id="tag">Cronograma Oficial</div>

</div>

<div class="timeline" id="lista"></div>

<button class="btn" onclick="window.print()">Exportar PDF</button>

<script>
const supa = supabase.createClient(
'https://vuiqbdqnfnofwkpvvuqy.supabase.co',
'sb_publishable_LjKm4HF9kyD7m0ch3Eefdw_TJ5SG6w2'
);

const params = new URLSearchParams(window.location.search);
const email = params.get('noiva');

async function load(){

if(!email){
document.getElementById('lista').innerHTML = "<p class='empty'>Link inválido</p>";
return;
}

const { data:user } = await supa.from('usuarios').select('*').eq('email',email).single();

if(user){

document.getElementById('nomes').innerText =
`${user.nome || 'Noiva'} & ${user.nome_noivo || 'Noivo'}`;

if(user.data_casamento){
const d = new Date(user.data_casamento);

document.getElementById('dataHora').innerText =
d.toLocaleDateString('pt-BR') + " • " +
d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}) + "h";
}

document.getElementById('local').innerText =
user.local_casamento || "";

if(user.paleta_cores){
document.documentElement.style.setProperty('--cor-tema',user.paleta_cores);

document.getElementById('nomes').style.color = user.paleta_cores;
document.getElementById('dataHora').style.color = user.paleta_cores;
document.getElementById('tag').style.borderColor = user.paleta_cores;
document.getElementById('selo').style.backgroundColor = user.paleta_cores;
}
}

const { data:crono } = await supa
.from('cronograma')
.select('*')
.eq('usuario_email',email)
.order('hora',{ascending:true});

const lista = document.getElementById('lista');

if(!crono || crono.length===0){
lista.innerHTML = "<p class='empty'>A definir o roteiro dos sonhos...</p>";
return;
}

let html="";

crono.forEach(i=>{
html += `
<div class="item">
<span class="time" style="color:var(--cor-tema)">
${i.hora.substring(0,5)}h
</span>

<span class="desc">${i.descricao}</span>
</div>`;
});

lista.innerHTML = html;
}

load();
</script>

</body>
</html>
