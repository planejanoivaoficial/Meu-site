<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cronograma Oficial | PlanejaNoiva</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,400&family=Montserrat:wght@200;400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
--cor-tema:#EEABAB;
--texto:#4A453E;
--bg:#FDF9F6;
--border:rgba(0,0,0,.08);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:var(--bg);
color:var(--texto);
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding:70px 20px;
font-family:'Cormorant Garamond',serif;
overflow-x:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;
background:url("https://www.transparenttextures.com/patterns/natural-paper.png");
opacity:.35;
z-index:-1;
}

body::after{
content:"";
position:fixed;
width:500px;
height:500px;
border-radius:50%;
background:radial-gradient(circle,var(--cor-tema),transparent 70%);
opacity:.08;
top:-220px;
right:-180px;
z-index:-1;
}

.header{
text-align:center;
max-width:760px;
margin-bottom:70px;
animation:fade .8s ease;
}

.logo{
height:110px;
margin-bottom:18px;
mix-blend-mode:multiply;
}

.names{
font-size:clamp(2.7rem,7vw,4.2rem);
font-style:italic;
font-weight:400;
line-height:1.08;
margin-bottom:14px;
color:var(--cor-tema);
transition:.4s;
}

.info{
font-family:'Montserrat';
font-size:.75rem;
letter-spacing:4px;
text-transform:uppercase;
line-height:2;
font-weight:700;
}

.local{
font-size:.72rem;
opacity:.58;
letter-spacing:2px;
margin-top:6px;
display:block;
}

.seal{
width:18px;
height:18px;
border-radius:50%;
margin:24px auto;
background:var(--cor-tema);
box-shadow:0 0 0 10px rgba(238,171,171,.10);
}

.tag{
font-family:'Montserrat';
font-size:.63rem;
letter-spacing:5px;
text-transform:uppercase;
padding:12px 38px;
border-top:1px solid var(--cor-tema);
border-bottom:1px solid var(--cor-tema);
display:inline-block;
margin-top:8px;
font-weight:700;
}

.timeline{
width:100%;
max-width:720px;
position:relative;
}

.timeline::before{
content:'';
position:absolute;
left:22px;
top:0;
bottom:0;
width:1px;
background:rgba(0,0,0,.08);
}

.item{
position:relative;
display:flex;
gap:28px;
margin-bottom:26px;
padding-left:65px;
animation:fadeUp .6s ease;
}

.dot{
position:absolute;
left:12px;
top:8px;
width:20px;
height:20px;
border-radius:50%;
background:var(--cor-tema);
box-shadow:
0 0 0 7px rgba(238,171,171,.10),
0 10px 25px rgba(0,0,0,.08);
}

.content{
background:rgba(255,255,255,.78);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,.6);
box-shadow:0 15px 40px rgba(0,0,0,.04);
border-radius:28px;
padding:24px;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
gap:20px;
}

.time{
font-family:'Montserrat';
font-size:.92rem;
font-weight:700;
min-width:90px;
color:var(--cor-tema);
letter-spacing:1px;
}

.desc{
font-size:1.7rem;
text-align:right;
font-style:italic;
line-height:1.2;
flex:1;
}

.empty{
text-align:center;
opacity:.45;
font-style:italic;
margin-top:40px;
font-size:1.5rem;
}

.btn{
margin-top:70px;
background:white;
border:1px solid var(--border);
padding:14px 38px;
border-radius:999px;
font-family:'Montserrat';
font-size:.62rem;
letter-spacing:3px;
text-transform:uppercase;
cursor:pointer;
transition:.3s;
font-weight:700;
box-shadow:0 10px 25px rgba(0,0,0,.04);
}

.btn:hover{
transform:translateY(-2px);
background:var(--cor-tema);
border-color:var(--cor-tema);
color:white;
}

.loading{
font-family:'Montserrat';
font-size:.8rem;
letter-spacing:3px;
text-transform:uppercase;
opacity:.5;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(15px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(18px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@media(max-width:700px){

body{
padding:40px 18px;
}

.logo{
height:84px;
}

.names{
font-size:2.45rem;
}

.content{
flex-direction:column;
align-items:flex-start;
gap:10px;
padding:20px;
}

.desc{
text-align:left;
font-size:1.45rem;
}

.time{
min-width:auto;
}

.timeline::before{
left:14px;
}

.item{
padding-left:45px;
}

.dot{
left:4px;
}
}

@media print{

body{
padding:30px;
background:white;
}

.btn{
display:none;
}

.content{
box-shadow:none;
border:1px solid #eee;
}

body::before,
body::after{
display:none;
}
}
</style>
</head>

<body>

<div class="header">

<img src="https://vuiqbdqnfnofwkpvvuqy.supabase.co/storage/v1/object/public/logos/logo.png" class="logo" alt="PlanejaNoiva">

<div class="names" id="nomes">
Carregando...
</div>

<div class="info">
<span id="dataHora"></span>
<span class="local" id="local"></span>
</div>

<div class="seal"></div>

<div class="tag">
Cronograma Oficial
</div>

</div>

<div class="timeline" id="lista">

<div class="loading">
Carregando cronograma...
</div>

</div>

<button class="btn" onclick="window.print()">
Exportar PDF
</button>

<script>
const supa = supabase.createClient(
'https://vuiqbdqnfnofwkpvvuqy.supabase.co',
'sb_publishable_LjKm4HF9kyD7m0ch3Eefdw_TJ5SG6w2'
);

const params = new URLSearchParams(window.location.search);

const email = params.get('noiva');
const token = params.get('token');

function escaparHTML(texto){
const div = document.createElement('div');
div.innerText = texto || '';
return div.innerHTML;
}

async function buscarEmailPublico(){

if(email){
return decodeURIComponent(email);
}

if(token){

const { data:config } = await supa
.from('mesas_assentos')
.select('usuario_email')
.eq('public_token', token)
.maybeSingle();

if(config && config.usuario_email){
return config.usuario_email;
}

}

return null;
}

async function load(){

const lista = document.getElementById('lista');

const emailNoiva = await buscarEmailPublico();

if(!emailNoiva){

lista.innerHTML = `
<p class="empty">
Link inválido
</p>
`;

document.getElementById('nomes').innerText =
'Cronograma indisponível';

return;
}

const { data:user } = await supa
.from('usuarios')
.select('*')
.eq('email', emailNoiva)
.single();

if(user){

document.getElementById('nomes').innerText =
`${user.nome || 'Noiva'} & ${user.nome_noivo || 'Noivo'}`;

if(user.data_casamento){

const d = new Date(user.data_casamento);

document.getElementById('dataHora').innerText =
d.toLocaleDateString('pt-BR') +
' • ' +
d.toLocaleTimeString('pt-BR',{
hour:'2-digit',
minute:'2-digit'
}) +
'h';

}

document.getElementById('local').innerText =
user.local_casamento || '';

if(user.paleta_cores){

document.documentElement.style.setProperty(
'--cor-tema',
user.paleta_cores
);

}

}

const { data:crono, error } = await supa
.from('cronograma')
.select('*')
.eq('usuario_email', emailNoiva)
.order('hora', { ascending:true });

if(error){

lista.innerHTML = `
<p class="empty">
Erro ao carregar cronograma
</p>
`;

return;
}

if(!crono || crono.length === 0){

lista.innerHTML = `
<p class="empty">
A definir o roteiro dos sonhos...
</p>
`;

return;
}

let html = '';

crono.forEach((item,index)=>{

html += `
<div class="item" style="animation-delay:${index * .06}s">

<div class="dot"></div>

<div class="content">

<div class="time">
${escaparHTML((item.hora || '').substring(0,5))}h
</div>

<div class="desc">
${escaparHTML(item.descricao)}
</div>

</div>

</div>
`;

});

lista.innerHTML = html;
}

load();
</script>

</body>
</html>
