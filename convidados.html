<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convidados Premium | PlanejaNoiva</title>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
:root{
  --rose:#EEABAB;
  --rose-dark:#D98F8F;
  --text:#3F3932;
  --muted:#8F857A;
  --cream:#FFF9F4;
  --border:#EADFD6;
  --green:#10B981;
  --red:#EF4444;
  --shadow:0 18px 50px rgba(63,57,50,.08);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  background:linear-gradient(180deg,#FFF8F3,#FBF6F1);
  color:var(--text);
  min-height:100vh;
}

nav{
  height:76px;
  background:rgba(255,255,255,.86);
  backdrop-filter:blur(16px);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 5%;
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  z-index:10;
}

.nav-logo{height:46px;mix-blend-mode:multiply}

.btn-voltar{
  text-decoration:none;
  color:var(--text);
  font-weight:800;
  background:white;
  border:1px solid var(--border);
  padding:11px 15px;
  border-radius:16px;
  display:flex;
  align-items:center;
  gap:8px;
}

.container{
  max-width:980px;
  margin:34px auto;
  padding:0 20px 60px;
}

.hero{
  background:white;
  border:1px solid var(--border);
  border-radius:34px;
  padding:34px;
  box-shadow:var(--shadow);
  margin-bottom:24px;
}

.badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:var(--cream);
  color:var(--rose-dark);
  border:1px solid var(--border);
  padding:9px 13px;
  border-radius:999px;
  font-size:.82rem;
  font-weight:900;
  margin-bottom:16px;
}

.hero h1{
  font-family:'Playfair Display',serif;
  font-size:2.6rem;
  line-height:1.05;
}

.hero p{
  color:var(--muted);
  line-height:1.7;
  margin-top:10px;
}

.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
  margin-top:24px;
}

.stat{
  background:var(--cream);
  border:1px solid var(--border);
  border-radius:22px;
  padding:18px;
}

.stat strong{
  display:block;
  font-size:1.8rem;
  color:var(--rose-dark);
}

.stat span{
  color:var(--muted);
  font-size:.84rem;
  font-weight:800;
}

.add-box{
  background:white;
  border:1px solid var(--border);
  border-radius:28px;
  padding:20px;
  box-shadow:0 12px 35px rgba(63,57,50,.045);
  display:flex;
  gap:12px;
  margin-bottom:22px;
}

.add-box input{
  flex:1;
  padding:15px 16px;
  border-radius:16px;
  border:1px solid var(--border);
  background:var(--cream);
  outline:none;
  font-size:1rem;
}

.add-box button{
  border:none;
  background:var(--rose);
  color:white;
  padding:0 22px;
  border-radius:16px;
  font-weight:900;
  cursor:pointer;
}

.guest-list{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.guest{
  background:white;
  border:1px solid var(--border);
  border-radius:22px;
  padding:18px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  box-shadow:0 10px 28px rgba(63,57,50,.04);
}

.guest-left{
  display:flex;
  align-items:center;
  gap:14px;
}

.avatar{
  width:46px;
  height:46px;
  border-radius:16px;
  background:var(--cream);
  color:var(--rose-dark);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
}

.guest-name{
  font-weight:900;
  display:block;
}

.status{
  display:inline-block;
  margin-top:4px;
  font-size:.75rem;
  font-weight:900;
  padding:5px 10px;
  border-radius:999px;
}

.status.ok{
  background:#E8F8F1;
  color:var(--green);
}

.status.pending{
  background:#F3EDE7;
  color:var(--muted);
}

.actions{
  display:flex;
  gap:8px;
}

.icon-btn{
  border:none;
  width:42px;
  height:42px;
  border-radius:15px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

.confirm-btn{
  background:#E8F8F1;
  color:var(--green);
}

.delete-btn{
  background:#FFF1F1;
  color:var(--red);
}

.empty{
  background:white;
  border:1px dashed var(--border);
  border-radius:24px;
  padding:30px;
  text-align:center;
  color:var(--muted);
}

@media(max-width:720px){
  .hero h1{font-size:2.1rem}
  .stats{grid-template-columns:1fr}
  .add-box{flex-direction:column}
  .add-box button{padding:15px}
  .guest{align-items:flex-start;flex-direction:column}
  .actions{width:100%}
  .icon-btn{flex:1}
}
</style>
</head>

<body>

<nav>
  <img src="https://i.ibb.co/YTTQXBx8/Logo-Planeja-Noiva.png" class="nav-logo">
  <a href="dashboard.html" class="btn-voltar">
    <span class="material-symbols-outlined">arrow_back</span>
    Painel
  </a>
</nav>

<div class="container">

  <section class="hero">
    <div class="badge">
      <span class="material-symbols-outlined">groups</span>
      Gestão premium de convidados
    </div>

    <h1>A lista de presença sem caos, sem papel e sem dúvida.</h1>
    <p>
      Cadastre convidados, acompanhe confirmações e tenha uma visão clara de quem estará presente no grande dia.
    </p>

    <div class="stats">
      <div class="stat">
        <strong id="total">0</strong>
        <span>Total de convidados</span>
      </div>

      <div class="stat">
        <strong id="confirmados">0</strong>
        <span>Confirmados</span>
      </div>

      <div class="stat">
        <strong id="pendentes">0</strong>
        <span>Pendentes</span>
      </div>
    </div>
  </section>

  <div class="add-box">
    <input id="nome" placeholder="Ex: Tia Maria, João e família...">
    <button onclick="add()">Adicionar convidado</button>
  </div>

  <div id="lista" class="guest-list"></div>

</div>

<script>
const supa = supabase.createClient(
  'https://vuiqbdqnfnofwkpvvuqy.supabase.co',
  'sb_publishable_LjKm4HF9kyD7m0ch3Eefdw_TJ5SG6w2'
);

const email = localStorage.getItem('usuario_email');

if (!email) {
  window.location.href = 'index.html';
}

function inicial(nome){
  return nome ? nome.trim().charAt(0).toUpperCase() : "C";
}

async function load(){
  const { data, error } = await supa
    .from('convidados')
    .select('*')
    .eq('usuario_email', email)
    .order('nome', { ascending:true });

  if (error) {
    Swal.fire("Erro ao carregar convidados");
    return;
  }

  const lista = document.getElementById('lista');

  if (!data || data.length === 0) {
    lista.innerHTML = `
      <div class="empty">
        Nenhum convidado cadastrado ainda. Comece adicionando os nomes principais da família.
      </div>
    `;

    document.getElementById('total').innerText = 0;
    document.getElementById('confirmados').innerText = 0;
    document.getElementById('pendentes').innerText = 0;
    return;
  }

  let confirmados = 0;
  let html = "";

  data.forEach(c => {
    if (c.confirmado) confirmados++;

    html += `
      <div class="guest">
        <div class="guest-left">
          <div class="avatar">${inicial(c.nome)}</div>

          <div>
            <span class="guest-name">${c.nome}</span>
            <span class="status ${c.confirmado ? 'ok' : 'pending'}">
              ${c.confirmado ? 'Confirmado' : 'Pendente'}
            </span>
          </div>
        </div>

        <div class="actions">
          <button class="icon-btn confirm-btn" onclick="toggle(${c.id}, ${c.confirmado})">
            <span class="material-symbols-outlined">
              ${c.confirmado ? 'check_circle' : 'radio_button_unchecked'}
            </span>
          </button>

          <button class="icon-btn delete-btn" onclick="del(${c.id})">
            <span class="material-symbols-outlined">delete</span>
          </button>
        </div>
      </div>
    `;
  });

  lista.innerHTML = html;

  document.getElementById('total').innerText = data.length;
  document.getElementById('confirmados').innerText = confirmados;
  document.getElementById('pendentes').innerText = data.length - confirmados;
}

async function add(){
  const input = document.getElementById('nome');
  const nome = input.value.trim();

  if (!nome) return;

  await supa.from('convidados').insert([
    { nome:nome, usuario_email:email, confirmado:false }
  ]);

  input.value = "";
  load();
}

async function toggle(id, status){
  await supa
    .from('convidados')
    .update({ confirmado: !status })
    .eq('id', id);

  load();
}

async function del(id){
  const resposta = await Swal.fire({
    title:"Remover convidado?",
    text:"Esse nome sairá da sua lista.",
    icon:"warning",
    showCancelButton:true,
    confirmButtonText:"Sim, remover",
    cancelButtonText:"Cancelar",
    confirmButtonColor:"#EEABAB"
  });

  if (!resposta.isConfirmed) return;

  await supa
    .from('convidados')
    .delete()
    .eq('id', id);

  load();
}

document.getElementById('nome').addEventListener("keypress", e => {
  if (e.key === "Enter") add();
});

load();
</script>

</body>
</html>
