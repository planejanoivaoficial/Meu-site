<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Convidados | PlanejaNoiva</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #F7EFE4; color: #4A453E; padding-bottom: 50px; }
        
        nav { background: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 15px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; }
        .nav-logo { height: 45px; mix-blend-mode: multiply; }
        .btn-voltar { color: #EEABAB; text-decoration: none; font-weight: 700; font-size: 0.9rem; display: flex; align-items: center; gap: 5px; }

        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        h2 { font-weight: 700; margin-bottom: 30px; font-size: 1.6rem; text-align: center; }

        /* Card de Adição Manual */
        .add-guest-area { background: white; padding: 25px; border-radius: 25px; margin-bottom: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); display: flex; gap: 10px; border: 1px solid rgba(238, 171, 171, 0.2); }
        .add-guest-area input { flex: 1; padding: 15px; border: 1px solid #E5DED5; border-radius: 12px; outline: none; background: #FCF9F5; font-size: 1rem; }
        .btn-add { background: #EEABAB; color: white; border: none; padding: 15px 25px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-add:hover { background: #e59a9a; transform: translateY(-2px); }

        /* Tabela de Convidados */
        .list-card { background: white; border-radius: 25px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #FCF9F5; padding: 15px 20px; text-align: left; font-size: 0.75rem; text-transform: uppercase; color: #B2ACA3; font-weight: 700; }
        td { padding: 20px; border-top: 1px solid #F7EFE4; }
        
        .guest-name { font-size: 1rem; font-weight: 700; color: #4A453E; }
        .status-badge { padding: 6px 14px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; display: inline-block; }
        .status-sim { background: #D1FAE5; color: #065F46; }
        .status-nao { background: #F3F4F6; color: #6B7280; }

        .actions { display: flex; align-items: center; gap: 15px; }
        .btn-icon { background: none; border: none; cursor: pointer; transition: 0.2s; }
        .btn-confirm { color: #10B981; }
        .btn-del { color: #F8D7DA; }
        .btn-del:hover { color: #EF4444; }
    </style>
</head>
<body>

    <nav>
        <img src="https://i.ibb.co/YTTQXBx8/Logo-Planeja-Noiva.png" class="nav-logo">
        <a href="dashboard.html" class="btn-voltar">
            <span class="material-symbols-outlined">arrow_back</span> Voltar ao Painel
        </a>
    </nav>

    <div class="container">
        <h2>Gestão de Convidados 🥂</h2>

        <div class="add-guest-area">
            <input type="text" id="inputNomeConvidado" placeholder="Nome do convidado (Ex: Tio João)">
            <button class="btn-add" onclick="adicionarConvidado()">Adicionar</button>
        </div>

        <div class="list-card">
            <table>
                <thead>
                    <tr>
                        <th>Convidado</th>
                        <th>Presença</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabelaCorpo">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://vuiqbdqnfnofwkpvvuqy.supabase.co', 'sb_publishable_LjKm4HF9kyD7m0ch3Eefdw_TJ5SG6w2');
        const email = localStorage.getItem('usuario_email');

        async function carregarConvidados() {
            const { data, error } = await _supabase
                .from('convidados')
                .select('*')
                .eq('usuario_email', email)
                .order('nome', { ascending: true });

            const corpo = document.getElementById('tabelaCorpo');
            corpo.innerHTML = "";

            if (data.length === 0) {
                corpo.innerHTML = "<tr><td colspan='3' style='text-align:center; padding:30px; color:#B2ACA3'>Nenhum convidado confirmado ainda.</td></tr>";
                return;
            }

            data.forEach(c => {
                corpo.innerHTML += `
                    <tr>
                        <td class="guest-name">${c.nome}</td>
                        <td>
                            <span class="status-badge ${c.confirmado ? 'status-sim' : 'status-nao'}">
                                ${c.confirmado ? 'Confirmado' : 'Pendente'}
                            </span>
                        </td>
                        <td class="actions">
                            <button class="btn-icon btn-confirm" onclick="toggleRSVP(${c.id}, ${c.confirmado})" title="Mudar Status">
                                <span class="material-symbols-outlined">${c.confirmado ? 'check_circle' : 'radio_button_unchecked'}</span>
                            </button>
                            <button class="btn-icon btn-del" onclick="excluirConvidado(${c.id})" title="Excluir">
                                <span class="material-symbols-outlined">delete</span>
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

        async function adicionarConvidado() {
            const input = document.getElementById('inputNomeConvidado');
            if (!input.value) return;
            
            await _supabase.from('convidados').insert([
                { nome: input.value, usuario_email: email, confirmado: true, parentesco: 'Manual' }
            ]);
            
            input.value = "";
            carregarConvidados();
        }

        async function toggleRSVP(id, status) {
            await _supabase.from('convidados').update({ confirmado: !status }).eq('id', id);
            carregarConvidados();
        }

        async function excluirConvidado(id) {
            if (confirm("Deseja remover este convidado da lista?")) {
                await _supabase.from('convidados').delete().eq('id', id);
                carregarConvidados();
            }
        }

        carregarConvidados();
    </script>
</body>
</html>
