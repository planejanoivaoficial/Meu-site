<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convidados Premium | PlanejaNoiva</title>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
:root{
  --rose:#EEABAB;
  --rose-dark:#D98F8F;
  --text:#3F3932;
  --muted:#8F857A;
  --cream:#FFF9F4;
  --border:#EADFD6;
  --green:#10B981;
  --red:#EF4444;
  --shadow:0 18px 50px rgba(63,57,50,.08);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  background:
    radial-gradient(circle at top left, rgba(238,171,171,.25), transparent 30%),
    linear-gradient(180deg,#FFF8F3,#FBF6F1);
  color:var(--text);
  min-height:100vh;
}

nav{
  height:76px;
  background:rgba(255,255,255,.86);
  backdrop-filter:blur(16px);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 5%;
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  z-index:10;
}

.nav-logo{height:46px;mix-blend-mode:multiply}

.btn-voltar{
  text-decoration:none;
  color:var(--text);
  font-weight:800;
  background:white;
  border:1px solid var(--border);
  padding:11px 15px;
  border-radius:16px;
  display:flex;
  align-items:center;
  gap:8px;
}

.container{
  max-width:980px;
  margin:34px auto;
  padding:0 20px 60px;
}

.hero{
  background:white;
  border:1px solid var(--border);
  border-radius:34px;
  padding:34px;
  box-shadow:var(--shadow);
  margin-bottom:24px;
}

.badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:var(--cream);
  color:var(--rose-dark);
  border:1px solid var(--border);
  padding:9px 13px;
  border-radius:999px;
  font-size:.82rem;
  font-weight:900;
  margin-bottom:16px;
}

.hero h1{
  font-family:'Playfair Display',serif;
  font-size:2.6rem;
  line-height:1.05;
}

.hero p{
  color:var(--muted);
  line-height:1.7;
  margin-top:10px;
}

.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
  margin-top:24px;
}

.stat{
  background:var(--cream);
  border:1px solid var(--border);
  border-radius:22px;
  padding:18px;
}

.stat strong{
  display:block;
  font-size:1.8rem;
  color:var(--rose-dark);
}

.stat span{
  color:var(--muted);
  font-size:.84rem;
  font-weight:800;
}

.add-box{
  background:white;
  border:1px solid var(--border);
  border-radius:28px;
  padding:20px;
  box-shadow:0 12px 35px rgba(63,57,50,.045);
  display:flex;
  gap:12px;
  margin-bottom:22px;
}

.add-box input{
  flex:1;
  padding:15px 16px;
  border-radius:16px;
  border:1px solid var(--border);
  background:var(--cream);
  outline:none;
  font-size:1rem;
  color:var(--text);
}

.add-box input:focus{
  border-color:var(--rose);
  background:white;
  box-shadow:0 0 0 4px rgba(238,171,171,.12);
}

.add-box button{
  border:none;
  background:var(--rose);
  color:white;
  padding:0 22px;
  border-radius:16px;
  font-weight:900;
  cursor:pointer;
}

.add-box button:disabled{
  opacity:.7;
  cursor:not-allowed;
}

.guest-list{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.guest{
  background:white;
  border:1px solid var(--border);
  border-radius:22px;
  padding:18px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  box-shadow:0 10px 28px rgba(63,57,50,.04);
}

.guest-left{
  display:flex;
  align-items:center;
  gap:14px;
}

.avatar{
  width:46px;
  height:46px;
  border-radius:16px;
  background:var(--cream);
  color:var(--rose-dark);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  flex-shrink:0;
}

.guest-name{
  font-weight:900;
  display:block;
  line-height:1.35;
}

.status{
  display:inline-block;
  margin-top:4px;
  font-size:.75rem;
  font-weight:900;
  padding:5px 10px;
  border-radius:999px;
}

.status.ok{
  background:#E8F8F1;
  color:var(--green);
}

.status.pending{
  background:#F3EDE7;
  color:var(--muted);
}

.actions{
  display:flex;
  gap:8px;
}

.icon-btn{
  border:none;
  width:42px;
  height:42px;
  border-radius:15px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

.confirm-btn{
  background:#E8F8F1;
  color:var(--green);
}

.delete-btn{
  background:#FFF1F1;
  color:var(--red);
}

.empty{
  background:white;
  border:1px dashed var(--border);
  border-radius:24px;
  padding:30px;
  text-align:center;
  color:var(--muted);
}

@media(max-width:720px){
  .hero h1{font-size:2.1rem}
  .stats{grid-template-columns:1fr}
  .add-box{flex-direction:column}
  .add-box button{padding:15px}
  .guest{align-items:flex-start;flex-direction:column}
  .actions{width:100%}
  .icon-btn{flex:1}
}
</style>
</head>

<body>

<nav>
  <img src="https://vuiqbdqnfnofwkpvvuqy.supabase.co/storage/v1/object/public/logos/logo.png" class="nav-logo" alt="PlanejaNoiva">
  <a href="dashboard.html" class="btn-voltar">
    <span class="material-symbols-outlined">arrow_back</span>
    Painel
  </a>
</nav>

<div class="container">

  <section class="hero">
    <div class="badge">
      <span class="material-symbols-outlined">groups</span>
      Gestão premium de convidados
    </div>

    <h1>A lista de presença sem caos, sem papel e sem dúvida.</h1>
    <p>
      Cadastre convidados, acompanhe confirmações e tenha uma visão clara de quem estará presente no grande dia.
    </p>

    <div class="stats">
      <div class="stat">
        <strong id="total">0</strong>
        <span>Total de convidados</span>
      </div>

      <div class="stat">
        <strong id="confirmados">0</strong>
        <span>Confirmados</span>
      </div>

      <div class="stat">
        <strong id="pendentes">0</strong>
        <span>Pendentes</span>
      </div>
    </div>
  </section>

  <div class="add-box">
    <input id="nome" placeholder="Ex: Tia Maria, João e família...">
    <button id="btnAdicionar" onclick="add()">Adicionar convidado</button>
  </div>

  <div id="lista" class="guest-list"></div>

</div>

<script>
const supa = supabase.createClient(
  'https://vuiqbdqnfnofwkpvvuqy.supabase.co',
  'sb_publishable_LjKm4HF9kyD7m0ch3Eefdw_TJ5SG6w2'
);

let usuarioLogado = null;
let email = null;

const inputNome = document.getElementById('nome');
const btnAdicionar = document.getElementById('btnAdicionar');
const lista = document.getElementById('lista');

async function iniciarConvidados(){
  const { data, error } = await supa.auth.getSession();

  if(error || !data.session){
    localStorage.clear();
    window.location.href = 'index.html';
    return;
  }

  usuarioLogado = data.session.user;
  email = usuarioLogado.email;

  localStorage.setItem('usuario_email', email);

  await load();
}

function escaparHTML(texto){
  const div = document.createElement('div');
  div.innerText = texto || '';
  return div.innerHTML;
}

function inicial(nome){
  return nome ? nome.trim().charAt(0).toUpperCase() : 'C';
}

async function load(){
  const { data, error } = await supa
    .from('convidados')
    .select('*')
    .eq('usuario_email', email)
    .order('nome', { ascending:true });

  if(error){
    Swal.fire({
      icon:'error',
      title:'Erro ao carregar',
      text:'Não foi possível carregar sua lista de convidados.',
      confirmButtonColor:'#EEABAB'
    });
    return;
  }

  if(!data || data.length === 0){
    lista.innerHTML = `
      <div class="empty">
        Nenhum convidado cadastrado ainda. Comece adicionando os nomes principais da família.
      </div>
    `;

    atualizarStats(0, 0);
    return;
  }

  let confirmados = 0;
  let html = '';

  data.forEach(c => {
    if(c.confirmado) confirmados++;

    html += `
      <div class="guest">
        <div class="guest-left">
          <div class="avatar">${escaparHTML(inicial(c.nome))}</div>

          <div>
            <span class="guest-name">${escaparHTML(c.nome)}</span>
            <span class="status ${c.confirmado ? 'ok' : 'pending'}">
              ${c.confirmado ? 'Confirmado' : 'Pendente'}
            </span>
          </div>
        </div>

        <div class="actions">
          <button class="icon-btn confirm-btn" onclick="toggle(${c.id}, ${c.confirmado})">
            <span class="material-symbols-outlined">
              ${c.confirmado ? 'check_circle' : 'radio_button_unchecked'}
            </span>
          </button>

          <button class="icon-btn delete-btn" onclick="del(${c.id})">
            <span class="material-symbols-outlined">delete</span>
          </button>
        </div>
      </div>
    `;
  });

  lista.innerHTML = html;
  atualizarStats(data.length, confirmados);
}

function atualizarStats(total, confirmados){
  document.getElementById('total').innerText = total;
  document.getElementById('confirmados').innerText = confirmados;
  document.getElementById('pendentes').innerText = total - confirmados;
}

async function add(){
  const nome = inputNome.value.trim();

  if(!nome){
    Swal.fire({
      icon:'warning',
      title:'Digite um nome',
      text:'Informe o nome do convidado antes de adicionar.',
      confirmButtonColor:'#EEABAB'
    });
    return;
  }

  btnAdicionar.disabled = true;
  btnAdicionar.innerText = 'Adicionando...';

  const { error } = await supa
    .from('convidados')
    .insert([{ nome:nome, usuario_email:email, confirmado:false }]);

  btnAdicionar.disabled = false;
  btnAdicionar.innerText = 'Adicionar convidado';

  if(error){
    Swal.fire({
      icon:'error',
      title:'Erro ao adicionar',
      text:'Não foi possível salvar esse convidado.',
      confirmButtonColor:'#EEABAB'
    });
    return;
  }

  inputNome.value = '';
  await load();
}

async function toggle(id, status){
  const { error } = await supa
    .from('convidados')
    .update({ confirmado: !status })
    .eq('id', id)
    .eq('usuario_email', email);

  if(error){
    Swal.fire({
      icon:'error',
      title:'Erro ao atualizar',
      text:'Não foi possível alterar a confirmação.',
      confirmButtonColor:'#EEABAB'
    });
    return;
  }

  await load();
}

async function del(id){
  const resposta = await Swal.fire({
    title:'Remover convidado?',
    text:'Esse nome sairá da sua lista.',
    icon:'warning',
    showCancelButton:true,
    confirmButtonText:'Sim, remover',
    cancelButtonText:'Cancelar',
    confirmButtonColor:'#D9534F',
    cancelButtonColor:'#EADFD6'
  });

  if(!resposta.isConfirmed) return;

  const { error } = await supa
    .from('convidados')
    .delete()
    .eq('id', id)
    .eq('usuario_email', email);

  if(error){
    Swal.fire({
      icon:'error',
      title:'Erro ao remover',
      text:'Não foi possível remover esse convidado.',
      confirmButtonColor:'#EEABAB'
    });
    return;
  }

  await load();
}

inputNome.addEventListener('keypress', e => {
  if(e.key === 'Enter') add();
});

iniciarConvidados();
</script>

</body>
</html>
