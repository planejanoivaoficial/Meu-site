<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmação de Presença | PlanejaNoiva</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --cor-base: #FDF9F6;
            --cor-primaria: #EEABAB;
            --cor-texto: #5A544E;
            --cor-detalhe: #B2ACA3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--cor-base); 
            font-family: 'Inter', sans-serif;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px;
        }

        .confirm-card { 
            background: white; 
            padding: 50px 30px; 
            border-radius: 30px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.03); 
            width: 100%; 
            max-width: 420px; 
            text-align: center; 
            position: relative;
            border: 1px solid rgba(238, 171, 171, 0.1);
        }

        /* Marca d'água elegante */
        .confirm-card::before {
            content: "";
            position: absolute;
            top: 10px; left: 10px; right: 10px; bottom: 10px;
            border: 1px solid #F7EFE4;
            border-radius: 20px;
            pointer-events: none;
        }

        .logo-img { height: 90px; margin-bottom: 30px; mix-blend-mode: multiply; opacity: 0.9; }
        
        h2 { 
            font-family: 'Cormorant Garamond', serif; 
            color: var(--cor-texto); 
            font-size: 2rem; 
            margin-bottom: 10px; 
            font-style: italic;
        }

        p { color: var(--cor-detalhe); font-size: 0.9rem; margin-bottom: 35px; letter-spacing: 0.5px; }
        
        .input-group { text-align: left; margin-bottom: 25px; position: relative; }
        
        label { 
            display: block; 
            font-size: 0.7rem; 
            font-weight: 600; 
            text-transform: uppercase; 
            color: var(--cor-detalhe); 
            margin-bottom: 8px; 
            margin-left: 5px;
        }

        input { 
            width: 100%; 
            padding: 16px; 
            border: 1px solid #F0E9E0; 
            border-radius: 15px; 
            outline: none; 
            background-color: #FDFDFD; 
            font-size: 1rem; 
            color: var(--cor-texto);
            transition: all 0.3s;
        }

        input:focus { border-color: var(--cor-primaria); box-shadow: 0 5px 15px rgba(238, 171, 171, 0.08); }

        .counter-container { display: flex; gap: 20px; margin-bottom: 30px; }
        
        .btn-confirmar { 
            width: 100%; 
            padding: 18px; 
            background-color: var(--cor-primaria); 
            color: white; 
            border: none; 
            border-radius: 15px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: 0.4s; 
            font-size: 1rem;
            letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(238, 171, 171, 0.2);
        }

        .btn-confirmar:hover { background-color: #e59a9a; transform: translateY(-3px); box-shadow: 0 15px 25px rgba(238, 171, 171, 0.3); }

        /* Sucesso */
        #mensagemSucesso { display: none; padding: 20px; animation: scaleUp 0.5s ease-out; }

        @keyframes scaleUp {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .footer-tag { margin-top: 30px; font-size: 0.65rem; color: #D1CBC3; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="confirm-card">
    <img src="https://i.ibb.co/YTTQXBx8/Logo-Planeja-Noiva.png" class="logo-img">
    
    <div id="formulario">
        <h2>Seja bem-vindo</h2>
        <p>Confirme sua presença abaixo:</p>
        
        <div class="input-group">
            <label>Seu Nome</label>
            <input type="text" id="nome" placeholder="Ex: Maria Oliveira">
        </div>

        <div class="counter-container">
            <div class="input-group" style="flex: 1;">
                <label>Adultos</label>
                <input type="number" id="adt" value="1" min="1">
            </div>
            <div class="input-group" style="flex: 1;">
                <label>Crianças</label>
                <input type="number" id="cri" value="0" min="0">
            </div>
        </div>

        <button class="btn-confirmar" onclick="salvar()">Confirmar Presença</button>
    </div>
    
    <div id="mensagemSucesso"></div>
    <div class="footer-tag">PlanejaNoiva © 2026</div>
</div>

<script>
    const _supabase = supabase.createClient('https://vuiqbdqnfnofwkpvvuqy.supabase.co', 'sb_publishable_LjKm4HF9kyD7m0ch3Eefdw_TJ5SG6w2');
    const urlParams = new URLSearchParams(window.location.search);
    const emailNoiva = urlParams.get('noiva');

    async function salvar() {
        const n = document.getElementById('nome').value;
        const a = document.getElementById('adt').value;
        const c = document.getElementById('cri').value;
        
        if (!n.trim() || !emailNoiva) {
            alert("Por favor, preencha seu nome corretamente.");
            return;
        }

        const btn = document.querySelector('.btn-confirmar');
        btn.innerText = "Enviando...";
        btn.disabled = true;

        const { error } = await _supabase.from('convidados').insert([
            { nome: `${n} (${a} adt / ${c} cri)`, usuario_email: emailNoiva, confirmado: true, parentesco: 'Online' }
        ]);

        if (!error) {
            document.getElementById('formulario').style.display = 'none';
            const msg = document.getElementById('mensagemSucesso');
            msg.innerHTML = `
                <span class="material-symbols-outlined" style="font-size: 80px; color: #10B981; font-weight: 200;">done_all</span>
                <h3 style="font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; color: #4A453E; margin-top: 10px;">Presença Confirmada!</h3>
                <p style="margin-top: 15px;">Agradecemos sua confirmação. Mal podemos esperar para celebrar com você!</p>
            `;
            msg.style.display = 'block';
        } else {
            alert("Erro ao enviar. Tente novamente.");
            btn.innerText = "Confirmar Presença";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
