<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Confirmação | PlanejaNoiva</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
:root{
--rose:#EEABAB;
--text:#5A544E;
--bg:#FDF9F6;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
background:linear-gradient(180deg,#FFF8F3,#FBF6F1);
font-family:'Inter';
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.card{
background:white;
padding:50px 35px;
border-radius:30px;
max-width:420px;
width:100%;
text-align:center;
box-shadow:0 20px 60px rgba(0,0,0,.05);
animation:fade .6s ease;
}

.logo{
height:80px;
margin-bottom:25px;
}

h1{
font-family:'Cormorant Garamond';
font-size:2rem;
font-style:italic;
margin-bottom:10px;
}

.sub{
color:#8F857A;
margin-bottom:30px;
}

.input{
width:100%;
padding:15px;
border-radius:12px;
border:1px solid #EADFD6;
background:#FCF9F5;
margin-bottom:15px;
}

.input:focus{
border-color:var(--rose);
background:white;
outline:none;
}

.grid{
display:flex;
gap:10px;
}

.btn{
width:100%;
padding:16px;
background:var(--rose);
color:white;
border:none;
border-radius:14px;
font-weight:600;
cursor:pointer;
transition:.3s;
margin-top:10px;
}

.btn:hover{
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(238,171,171,.4);
}

@keyframes fade{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}
</style>
</head>

<body>

<div class="card">

<img src="https://i.ibb.co/YTTQXBx8/Logo-Planeja-Noiva.png" class="logo">

<h1>Confirme sua presença 🥂</h1>
<p class="sub">Será um prazer ter você nesse momento especial</p>

<input type="text" id="nome" class="input" placeholder="Seu nome">

<div class="grid">
<input type="number" id="adt" class="input" value="1" min="1">
<input type="number" id="cri" class="input" value="0" min="0">
</div>

<button class="btn" onclick="confirmar()">Confirmar presença</button>

</div>

<script>
const supa = supabase.createClient(
'https://vuiqbdqnfnofwkpvvuqy.supabase.co',
'sb_publishable_LjKm4HF9kyD7m0ch3Eefdw_TJ5SG6w2'
);

const params = new URLSearchParams(window.location.search);
const emailNoiva = params.get('noiva');

async function confirmar(){

const nome = document.getElementById('nome').value;
const adt = document.getElementById('adt').value;
const cri = document.getElementById('cri').value;

if(!nome || !emailNoiva){
Swal.fire({
icon:'warning',
title:'Preencha seu nome',
confirmButtonColor:'#EEABAB'
});
return;
}

Swal.fire({
title:'Confirmando presença...',
allowOutsideClick:false,
didOpen:()=>Swal.showLoading()
});

const { error } = await supa.from('convidados').insert([{
nome: `${nome} (${adt} adultos / ${cri} crianças)`,
usuario_email: emailNoiva,
confirmado:true,
parentesco:'Online'
}]);

if(error){
Swal.fire({
icon:'error',
title:'Erro ao confirmar',
text:error.message,
confirmButtonColor:'#EEABAB'
});
}else{
Swal.fire({
icon:'success',
title:'Presença confirmada 💍',
text:'Nos vemos no grande dia!',
confirmButtonColor:'#EEABAB'
});
document.querySelector('.card').innerHTML = `
<h1 style="font-family:'Cormorant Garamond'">Obrigada ✨</h1>
<p class="sub">Sua presença foi confirmada com sucesso</p>
`;
}
}
</script>

</body>
</html>
